<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolViral - Create Content</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }
        header {
            position: sticky;
            top: 0;
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #1F1F1F;
            z-index: 100;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
        }
        /* Fee Warning Banner */
        .warning-banner {
            background-color: rgba(255, 214, 0, 0.1);
            border: 1px solid #FFD600;
            color: #FFD600;
            padding: 12px 15px;
            margin: 15px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
        }
        /* Tab Switches */
        .tab-container {
            display: flex;
            margin: 0 15px 20px 15px;
            background-color: #1A1A1A;
            border-radius: 8px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #888888;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #2A2A2A;
            color: #FFFFFF;
        }
        /* Editor Layout Forms */
        .write-form {
            display: none;
            flex-direction: column;
            gap: 15px;
            padding: 0 15px;
        }
        .write-form.active {
            display: flex;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 12px;
            color: #888888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .text-input, .textarea-input {
            width: 100%;
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #FFFFFF;
            padding: 12px;
            font-size: 15px;
            outline: none;
        }
        .text-input:focus, .textarea-input:focus {
            border-color: #4A4A4A;
        }
        .textarea-input {
            height: 300px;
            resize: none;
            line-height: 1.6;
        }
        .submit-btn {
            background-color: #FFFFFF;
            color: #0A0A0A;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 60px;
            background: #0A0A0A;
            border-top: 1px solid #1F1F1F;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="page-title">Publish Workspace</h1>
    </header>

    <div class="warning-banner">
        ⚠️ <strong>Creation Fee:</strong> Publishing a Novel or Story deducts <strong>25 Free Credits</strong>. Posts are limited to 3 per day across all categories.
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('novel')">Write Novel</button>
        <button class="tab-btn" onclick="switchTab('story')">Write Story</button>
    </div>

    <form id="novelForm" class="write-form active" onsubmit="handlePublish(event, 'novel')">
        <div class="input-group">
            <label>Novel Title</label>
            <input type="text" class="text-input" id="novelTitle" placeholder="Enter title..." required maxlength="100">
        </div>
        <div class="input-group">
            <label>Synopsis / Short Description</label>
            <input type="text" class="text-input" id="novelCaption" placeholder="Brief summary for feed..." required maxlength="200">
        </div>
        <div class="input-group">
            <label>Full Content</label>
            <textarea class="textarea-input" id="novelContent" placeholder="Start typing your long-form masterpiece..." required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="novelSubmit">Publish Novel (-25 pts)</button>
    </form>

    <form id="storyForm" class="write-form" onsubmit="handlePublish(event, 'story')">
        <div class="input-group">
            <label>Story Title</label>
            <input type="text" class="text-input" id="storyTitle" placeholder="Enter story name..." required maxlength="100">
        </div>
        <div class="input-group">
            <label>Caption / Teaser</label>
            <input type="text" class="text-input" id="storyCaption" placeholder="Teaser for the feed element..." required maxlength="200">
        </div>
        <div class="input-group">
            <label>Story Text</label>
            <textarea class="textarea-input" id="storyContent" placeholder="Write your short story narrative context..." required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="storySubmit">Publish Story (-25 pts)</button>
    </form>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>Feed</span></a>
        <a href="explore.html" class="nav-item"><span>🔍</span><span>Explore</span></a>
        <a href="post.html" class="nav-item"><span>➕</span><span>Post</span></a>
        <a href="reels.html" class="nav-item"><span>🎬</span><span>Reels</span></a>
        <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
    </nav>

    <script>
        const API_BASE = "https://api.golviral.com";
        const token = localStorage.getItem("token") || "";

        function switchTab(type) {
            const btns = document.querySelectorAll('.tab-btn');
            const forms = document.querySelectorAll('.write-form');
            
            if (type === 'novel') {
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
                forms[0].classList.add('active');
                forms[1].classList.remove('active');
            } else {
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                forms[0].classList.remove('active');
                forms[1].classList.add('active');
            }
        }

        // Submits textual content directly to standard endpoint engine parameters
        async function handlePublish(event, type) {
            event.preventDefault();
            
            const submitBtn = document.getElementById(`${type}Submit`);
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Transaction...";

            const title = document.getElementById(`${type}Title`).value;
            const caption = document.getElementById(`${type}Caption`).value;
            const content = document.getElementById(`${type}Content`).value;

            try {
                const response = await fetch(`${API_BASE}/posts`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        type: type, // "novel" or "story"
                        title: title,
                        caption: caption,
                        content: content
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "Failed to commit content submission.");
                }

                alert("Content published successfully! 25 points deducted.");
                window.location.href = "profile.html";

            } catch (err) {
                alert(err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = `Publish ${type === 'novel' ? 'Novel' : 'Story'} (-25 pts)`;
            }
        }
    </script>
</body>
</html>
