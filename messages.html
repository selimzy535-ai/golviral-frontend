<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GolViral - Messages</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{--bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.7);--accent:#00ff88;--text:#fff;--muted:#888;--border:#1a1a1a}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;height:100dvh;display:flex;flex-direction:column}
header{padding:16px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
.list{flex:1;overflow-y:auto}
.chat-item{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer}
.chat-item:hover{background:var(--card)}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000}
.chat-wrap{display:flex;flex-direction:column;flex:1}
.chat-header{padding:16px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:75%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.4}
.sent{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#00cc6a);color:#000;border-bottom-right-radius:4px}
.recv{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.input-area{padding:12px;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:20px;outline:none}
.send-btn{background:var(--accent);border:none;border-radius:50%;width:44px;height:44px;display:flex;justify-content:center;align-items:center;cursor:pointer}
.typing{display:flex;gap:4px;padding:8px 16px}
.dot{width:8px;height:8px;background:var(--muted);border-radius:50%;animation:blink 1.4s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,60%,100%{opacity:0.3}30%{opacity:1}}
.error-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:200}
.error-box{background:var(--glass);border:1px solid var(--border);padding:20px;border-radius:16px;text-align:center}
</style>
</head>
<body>

<!-- CHAT LIST -->
<div id="chat-list-screen">
<header><svg onclick="location.href='index.html'" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><h3>Messages</h3></header>
<div class="list" id="chat-list"></div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" style="display:none;flex-direction:column;height:100dvh">
<header class="chat-header">
<svg onclick="backToList()" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
<div class="avatar" id="chat-avatar"></div>
<div><b id="chat-name"></b></div>
</header>

<div class="chat-box" id="chat-box"></div>
<div id="typing-indicator" class="typing" style="display:none"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<div class="input-area">
<input class="input" id="msg-input" placeholder="Message..." onkeydown="handleTyping()">
<button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
</div>
</div>

<div id="dm-error" class="error-modal"><div class="error-box">
<svg viewBox="0 0 24 24" style="color:#ff0044;margin-bottom:8px"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
<p>DM Locked</p><p style="color:var(--muted);font-size:14px">Both users must enable monetization or unlock DM</p>
<button class="send-btn" style="width:100%;margin-top:12px;border-radius:12px" onclick="closeError()">OK</button>
</div></div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
if(!TOKEN) location.href='auth.html';

const params=new URLSearchParams(location.search);
const toUserId=params.get('to');
let socket=null; let currentChat=null; let typingTimer=null;

function showScreen(s){document.getElementById('chat-list-screen').style.display=s==='list'?'block':'none';document.getElementById('chat-screen').style.display=s==='chat'?'flex':'none'}

async function api(path,opt={}){
const res=await fetch(API+path,{...opt,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...opt.headers}});
if(res.status===401) location.href='auth.html';
return res.json();
}

// INIT SOCKET
function initSocket(){
socket=io(API,{auth:{token:TOKEN}});
socket.on('connect',()=>console.log('socket connected'));
socket.on('receive_message',data=>{if(data.senderId===currentChat)addBubble(data.text,'recv')});
socket.on('typing',data=>{if(data.senderId===currentChat)showTyping()});
socket.on('disconnect',()=>console.log('socket disconnected'));
}

// LOAD CHAT LIST
async function loadChatList(){
const chats=await api('/api/messages'); // assuming this returns last messages
document.getElementById('chat-list').innerHTML=chats.map(c=>`
<div class="chat-item" onclick="openChat('${c.userId}','${c.username}')">
<div class="avatar">${c.username[0]}</div>
<div class="chat-wrap">
<b>${c.username}</b>
<small style="color:var(--muted)">${c.lastMessage||'No messages yet'}</small>
</div>
</div>`).join('');
}

// OPEN CHAT
async function openChat(userId,username){
currentChat=userId;
document.getElementById('chat-name').innerText=username;
document.getElementById('chat-avatar').innerText=username[0];
showScreen('chat');
const d=await api(`/api/messages/${userId}`);
document.getElementById('chat-box').innerHTML='';
d.messages.forEach(m=>addBubble(m.text,m.senderId===localStorage.userId?'sent':'recv'));
}

function backToList(){showScreen('list');currentChat=null}

// SEND MESSAGE
async function sendMessage(){
const text=document.getElementById('msg-input').value.trim();
if(!text)return;
document.getElementById('msg-input').value='';
addBubble(text,'sent');

if(socket && socket.connected){
socket.emit('send_message',{receiverId:currentChat,text});
}else{
const res=await api('/api/message/send',{method:'POST',body:JSON.stringify({receiverId:currentChat,text})});
if(res.error)showError();
}
}

// TYPING
function handleTyping(){
if(socket) socket.emit('typing',{receiverId:currentChat});
clearTimeout(typingTimer);
typingTimer=setTimeout(()=>{},1000);
}

function showTyping(){
document.getElementById('typing-indicator').style.display='flex';
setTimeout(()=>document.getElementById('typing-indicator').style.display='none',2000);
}

function addBubble(text,type){
const div=document.createElement('div');
div.className='bubble '+type;
div.innerText=text;
document.getElementById('chat-box').appendChild(div);
document.getElementById('chat-box').scrollTop=99999;
}

function showError(){document.getElementById('dm-error').style.display='flex'}
function closeError(){document.getElementById('dm-error').style.display='none'}

// INIT
initSocket();
if(toUserId){api(`/api/search/users?q=${toUserId}`).then(u=>openChat(toUserId,u[0].username))}else{loadChatList();showScreen('list')}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
</body>
</html>
