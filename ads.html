<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolViral - Run Ads</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }
        header {
            position: sticky;
            top: 0;
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1F1F1F;
            z-index: 100;
        }
        .back-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
        }
        .container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .section-desc {
            font-size: 14px;
            color: #888888;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        /* Form Structuring */
        .ad-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 12px;
            color: #888888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .text-input, .select-input {
            width: 100%;
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #FFFFFF;
            padding: 12px;
            font-size: 15px;
            outline: none;
        }
        .text-input:focus, .select-input:focus {
            border-color: #4A4A4A;
        }
        /* Payment Selection Block */
        .payment-toggle {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .method-card {
            background-color: #111111;
            border: 1px solid #1F1F1F;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .method-card.selected {
            border-color: #00C853;
            background-color: rgba(0, 200, 83, 0.05);
        }
        .method-title {
            font-size: 14px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }
        .method-desc {
            font-size: 11px;
            color: #666666;
        }
        .submit-btn {
            background-color: #00C853;
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 60px;
            background: #0A0A0A;
            border-top: 1px solid #1F1F1F;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="history.back()">⬅</button>
        <h1 class="page-title">Campaign Manager</h1>
    </header>

    <main class="container">
        <p class="section-desc">
            Amplify your target metrics. Boost your existing reels, stories, or external monetization links across the platform ecosystem.
        </p>

        <form id="adCampaignForm" class="ad-form" onsubmit="handleCampaignSubmission(event)">
            <div class="input-group">
                <label>Campaign Objective Title</label>
                <input type="text" id="campaignTitle" class="text-input" placeholder="e.g., SmartLink Promo" required>
            </div>

            <div class="input-group">
                <label>Target Destination URL</label>
                <input type="url" id="targetUrl" class="text-input" placeholder="https://..." required>
            </div>

            <div class="input-group">
                <label>Estimated Impressions Volume Cap</label>
                <select id="impressionTier" class="select-input" onchange="calculateCampaignCosts()">
                    <option value="5000">5,000 Views Package</option>
                    <option value="20000">20,000 Views Package</option>
                    <option value="50000">50,000 Views Package</option>
                </select>
            </div>

            <div class="input-group">
                <label>Settlement Method Settlement</label>
                <div class="payment-toggle">
                    <div id="methodFree" class="method-card selected" onclick="selectPaymentMethod('free')">
                        <span class="method-title">Free Credits</span>
                        <span class="method-desc" id="costFree">0 pts</span>
                    </div>
                    <div id="methodFiat" class="method-card" onclick="selectPaymentMethod('fiat')">
                        <span class="method-title">Merchant Pay</span>
                        <span class="method-desc" id="costFiat">₦0</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="campaignSubmitBtn">Launch Ad Campaign</button>
        </form>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>Feed</span></a>
        <a href="explore.html" class="nav-item"><span>🔍</span><span>Explore</span></a>
        <a href="post.html" class="nav-item"><span>➕</span><span>Post</span></a>
        <a href="reels.html" class="nav-item"><span>🎬</span><span>Reels</span></a>
        <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
    </nav>

    <script>
        const API_BASE = "https://api.golviral.com";
        const token = localStorage.getItem("token") || "";
        
        let chosenMethod = "free"; 

        // Platform structural baseline calculation configuration parameters
        const baseCostPerViewPts = 2; // 2 points per programmatic impression capture
        const conversionDivisor = 10; // 10 pts = ₦1 base calculation conversion rule

        function calculateCampaignCosts() {
            const impressions = parseInt(document.getElementById("impressionTier").value);
            const totalPointsCost = impressions * baseCostPerViewPts;
            const totalFiatCost = totalPointsCost / conversionDivisor;

            document.getElementById("costFree").innerText = `${totalPointsCost.toLocaleString()} pts`;
            document.getElementById("costFiat").innerText = `₦${totalFiatCost.toLocaleString()}`;
        }

        function selectPaymentMethod(method) {
            chosenMethod = method;
            const cardFree = document.getElementById("methodFree");
            const cardFiat = document.getElementById("methodFiat");

            if (method === 'free') {
                cardFree.classList.add("selected");
                cardFiat.classList.remove("selected");
            } else {
                cardFiat.classList.add("selected");
                cardFree.classList.remove("selected");
            }
        }

        async function handleCampaignSubmission(event) {
            event.preventDefault();
            const submitBtn = document.getElementById("campaignSubmitBtn");
            submitBtn.disabled = true;
            submitBtn.innerText = "Provisioning Placement Node...";

            const title = document.getElementById("campaignTitle").value;
            const targetUrl = document.getElementById("targetUrl").value;
            const volume = document.getElementById("impressionTier").value;

            try {
                const response = await fetch(`${API_BASE}/ads/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title,
                        targetUrl,
                        volume: parseInt(volume),
                        paymentMethod: chosenMethod
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || "Failed execution loop parsing.");

                if (chosenMethod === 'fiat' && data.checkoutUrl) {
                    // Forward directly to external merchant gateway mapping parameters
                    window.location.href = data.checkoutUrl;
                } else {
                    alert("Campaign launched successfully inside platform rotation pool!");
                    window.location.href = "profile.html";
                }

            } catch (err) {
                alert(err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Launch Ad Campaign";
            }
        }

        // Trigger dynamic pricing calibration updates on structural boot
        calculateCampaignCosts();
    </script>
</body>
</html>
