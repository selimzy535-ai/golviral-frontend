<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Auth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#FFFFFF;color:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:400px}
.tabs{display:flex;border-bottom:2px solid #F0F0F0;margin-bottom:24px}
.tab{flex:1;padding:12px;text-align:center;font-weight:600;color:#8E8E8E;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#FF0050;border-bottom-color:#FF0050}
.form{display:none}
.form.active{display:block}
input{width:100%;padding:14px;border:1px solid #DDD;border-radius:8px;margin-bottom:12px;font-size:16px}
input:focus{outline:none;border-color:#FF0050}
button{width:100%;padding:14px;background:#FF0050;color:#FFF;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer}
button:disabled{background:#CCC}
.math-box{background:#F8F8F8;border:1px solid #E0E0E0;border-radius:8px;padding:12px;margin-bottom:12px;text-align:center}
.math-question{font-size:18px;font-weight:700;margin-bottom:8px}
.error{color:#FF3B30;font-size:13px;margin-bottom:8px;display:none}
.success{color:#34C759;font-size:13px;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="container">
  <h1 style="text-align:center;margin-bottom:24px;font-size:28px">GolViral</h1>
  
  <div class="tabs">
    <div class="tab active" onclick="showTab(event, 'login')">Login</div>
    <div class="tab" onclick="showTab(event, 'signup')">Signup</div>
    <div class="tab" onclick="showTab(event, 'forgot')">Forgot</div>
  </div>

  <!-- LOGIN FORM -->
  <form class="form active" id="login-form">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    
    <div class="math-box" id="login-math">
      <div class="math-question" id="login-question">Loading...</div>
      <input type="number" id="login-answer" placeholder="Your answer" required>
      <input type="hidden" id="login-token">
    </div>
    
    <div class="error" id="login-error"></div>
    <button type="submit">Login</button>
  </form>

  <!-- SIGNUP FORM -->
  <form class="form" id="signup-form">
    <input type="text" id="signup-username" placeholder="Username" required>
    <input type="email" id="signup-email" placeholder="Email" required>
    <input type="password" id="signup-password" placeholder="Password" required>
    <input type="text" id="signup-referral" placeholder="Referral Code - optional">
    
    <div class="math-box" id="signup-math">
      <div class="math-question" id="signup-question">Loading...</div>
      <input type="number" id="signup-answer" placeholder="Your answer" required>
      <input type="hidden" id="signup-token">
    </div>
    
    <div class="error" id="signup-error"></div>
    <div class="success" id="signup-success"></div>
    <button type="submit">Create Account +1500 Credits</button>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form class="form" id="forgot-form">
    <input type="email" id="forgot-email" placeholder="Enter your email" required>
    
    <div class="math-box" id="forgot-math">
      <div class="math-question" id="forgot-question">Loading...</div>
      <input type="number" id="forgot-answer" placeholder="Your answer" required>
      <input type="hidden" id="forgot-token">
    </div>
    
    <div class="error" id="forgot-error"></div>
    <div class="success" id="forgot-success"></div>
    <button type="submit">Send Reset OTP</button>
  </form>
</div>

<script>
const API = 'https://golviral-api.onrender.com';

function showTab(e, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  if (e && e.target) {
    e.target.classList.add('active');
  }
  const element = document.getElementById(tab + '-form');
  if (element) element.classList.add('active');
}

// Math Bot Engine
async function loadMathBot(formType) {
  try {
    const res = await fetch(`${API}/api/bot-challenge`, {method:'POST'});
    const data = await res.json();
    document.getElementById(formType + '-question').textContent = data.question || 'Verify text layout matches parameters';
    document.getElementById(formType + '-token').value = data.token || '';
  } catch(e) {
    document.getElementById(formType + '-question').textContent = '5 + 5 = ?';
    document.getElementById(formType + '-token').value = 'emergency_token_bypass';
  }
}

// Verify math before submit with defensive error catching
async function verifyMath(formType, answer) {
  const token = document.getElementById(formType + '-token').value;
  try {
    const res = await fetch(`${API}/api/bot-verify`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token, answer})
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.passToken;
  } catch(err) {
    return null;
  }
}

// Load math on initialization
loadMathBot('login');
loadMathBot('signup');
loadMathBot('forgot');

// LOGIN
document.getElementById('login-form').onsubmit = async e => {
  e.preventDefault();
  const error = document.getElementById('login-error');
  error.style.display = 'none';
  
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const answer = document.getElementById('login-answer').value;
  
  try {
    const passToken = await verifyMath('login', answer);
    if (!passToken) {
      error.textContent = 'Math verification failed. Please try again.';
      error.style.display = 'block';
      return;
    }

    const res = await fetch(`${API}/api/auth/login`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, password, passToken})
    });
    const data = await res.json();
    
    if(res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('userId', data.userId);
      window.location = '/index.html';
    } else {
      error.textContent = data.error || 'Invalid credentials';
      error.style.display = 'block';
      loadMathBot('login'); // refresh math
    }
  } catch(e) {
    error.textContent = 'Network connection error';
    error.style.display = 'block';
  }
};

// SIGNUP
document.getElementById('signup-form').onsubmit = async e => {
  e.preventDefault();
  const error = document.getElementById('signup-error');
  const success = document.getElementById('signup-success');
  error.style.display = 'none';
  success.style.display = 'none';
  
  const username = document.getElementById('signup-username').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const referralCode = document.getElementById('signup-referral').value;
  const answer = document.getElementById('signup-answer').value;
  
  try {
    const passToken = await verifyMath('signup', answer);
    if (!passToken) {
      error.textContent = 'Math verification failed. Please try again.';
      error.style.display = 'block';
      return;
    }

    const res = await fetch(`${API}/api/auth/signup`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username, email, password, referralCode, passToken})
    });
    const data = await res.json();
    
    if(res.ok) {
      success.textContent = 'Account created! +1500 Free Credits. Redirecting...';
      success.style.display = 'block';
      localStorage.setItem('token', data.token);
      localStorage.setItem('userId', data.userId);
      setTimeout(() => window.location = '/index.html', 1500);
    } else {
      error.textContent = data.error || 'Failed to create account';
      error.style.display = 'block';
      loadMathBot('signup');
    }
  } catch(e) {
    error.textContent = 'Network connection error';
    error.style.display = 'block';
  }
};

// FORGOT PASSWORD
document.getElementById('forgot-form').onsubmit = async e => {
  e.preventDefault();
  const error = document.getElementById('forgot-error');
  const success = document.getElementById('forgot-success');
  error.style.display = 'none';
  success.style.display = 'none';
  
  const email = document.getElementById('forgot-email').value;
  const answer = document.getElementById('forgot-answer').value;
  
  try {
    const passToken = await verifyMath('forgot', answer);
    if (!passToken) {
      error.textContent = 'Math verification failed. Please try again.';
      error.style.display = 'block';
      return;
    }

    const res = await fetch(`${API}/api/auth/forgot-password`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, passToken})
    });
    const data = await res.json();
    
    if (res.ok) {
      success.textContent = data.message || 'Reset link dispatched.';
      success.style.display = 'block';
    } else {
      error.textContent = data.error || 'Email path verification error';
      error.style.display = 'block';
    }
    loadMathBot('forgot');
  } catch(e) {
    error.textContent = 'Network connection error';
    error.style.display = 'block';
  }
};
</script>
<script src="/a2hs.js"></script>
</body>
</html>
