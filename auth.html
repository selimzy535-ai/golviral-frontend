
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GolViral - Login</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.7);--accent:#00ff88;--text:#fff;--muted:#888;--border:#1a1a1a}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
header{padding:20px;display:flex;justify-content:center;align-items:center;gap:10px;font-size:22px;font-weight:900;color:var(--accent)}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;margin:20px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{flex:1;text-align:center;padding:12px;border-radius:12px;color:var(--muted);font-weight:700;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:6px}
.tab.active{background:var(--accent);color:#000}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;outline:none;margin-bottom:12px;font-size:16px}
.btn{background:linear-gradient(90deg,var(--accent),#00cc6a);color:#000;border:none;padding:14px;border-radius:12px;font-weight:900;width:100%;cursor:pointer;font-size:16px}
.btn:disabled{opacity:0.5}
svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:200}
.modal.active{display:flex}
.glass-modal{background:var(--glass);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:24px;width:90%;max-width:400px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.chip{padding:8px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:14px}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<header>
<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
GolViral
</header>

<div id="toast" class="toast"></div>

<main class="card">
<div class="tabs">
<div class="tab active" onclick="showTab('login', this)"><svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>Login</div>
<div class="tab" onclick="showTab('signup', this)"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM20 8v6M23 11h-6"/></svg>Signup</div>
<div class="tab" onclick="showTab('forgot', this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0.33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0.33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Forgot</div>
</div>

<form id="form-login">
<input class="input" id="login-email" type="email" placeholder="Email" required>
<input class="input" id="login-pass" type="password" placeholder="Password" required>
<button class="btn" type="submit">Login</button>
</form>

<form id="form-signup" style="display:none">
<input class="input" id="signup-user" placeholder="Username" required>
<input class="input" id="signup-email" type="email" placeholder="Email" required>
<input class="input" id="signup-pass" type="password" placeholder="Password" required>
<input class="input" id="signup-ref" placeholder="Referral Code Optional">
<button class="btn" type="submit">Create Account</button>
</form>

<form id="form-forgot" style="display:none">
<input class="input" id="forgot-email" type="email" placeholder="Email" required>
<button class="btn" type="submit">Send OTP</button>
</form>
</main>

<div id="bot-modal" class="modal">
<div class="glass-modal">
<h3 style="margin-bottom:12px">Verify You Are Human</h3>
<p id="bot-question" style="font-size:20px;font-weight:800;margin-bottom:12px"></p>
<input class="input" id="bot-answer" placeholder="Answer">
<button class="btn" onclick="verifyBot()">Verify</button>
</div>
</div>

<div id="onboard-modal" class="modal">
<div class="glass-modal">
<h3 style="margin-bottom:12px">Welcome to GolViral</h3>
<p style="color:var(--muted);margin-bottom:16px">Pick up to 3 interests</p>
<div class="chips" id="chips"></div>
<p style="color:var(--muted);margin:16px 0 8px">Account Type</p>
<label><input type="radio" name="role" value="Viewer" checked> Viewer</label><br>
<label><input type="radio" name="role" value="Creator"> Creator</label>
<p style="color:var(--muted);margin:16px 0 8px">Country</p>
<select class="input" id="country"><option>NG</option><option>US</option><option>UK</option><option>CA</option></select>
<button class="btn" onclick="finishOnboard()">Continue</button>
</div>
</div>

<script>
const API='https://golviral-api.onrender.com';
let currentTab='login'; let pendingData=null; let botToken=null;

function showTab(tab, el){
currentTab=tab;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('form').forEach(f=>f.style.display='none');
el.classList.add('active');
document.getElementById('form-'+tab).style.display='block';
}

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

async function botChallenge(){
const res=await fetch(API+'/api/bot-challenge',{method:'POST'});
const data=await res.json();
botToken=data.token;
document.getElementById('bot-question').innerText=data.question;
document.getElementById('bot-modal').classList.add('active');
}

async function verifyBot(){
const answer=document.getElementById('bot-answer').value;
const res=await fetch(API+'/api/bot-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:botToken,answer})});
const data=await res.json();
if(data.passToken){
document.getElementById('bot-modal').classList.remove('active');
document.getElementById('bot-answer').value='';
if(pendingData.type==='login') doLogin(pendingData, data.passToken);
if(pendingData.type==='signup') doSignup(pendingData, data.passToken);
if(pendingData.type==='forgot') doForgot(pendingData, data.passToken);
}else toast('Wrong answer');
}

document.getElementById('form-login').onsubmit=async e=>{
e.preventDefault();
pendingData={
type:'login',
email:document.getElementById('login-email').value,
password:document.getElementById('login-pass').value
};
botChallenge();
}

document.getElementById('form-signup').onsubmit=async e=>{
e.preventDefault();
pendingData={
type:'signup',
username:document.getElementById('signup-user').value,
email:document.getElementById('signup-email').value,
password:document.getElementById('signup-pass').value,
referralCode:document.getElementById('signup-ref').value
};
botChallenge();
}

document.getElementById('form-forgot').onsubmit=async e=>{
e.preventDefault();
pendingData={
type:'forgot',
email:document.getElementById('forgot-email').value
};
botChallenge();
}

async function doLogin(d,passToken){
const res=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...d,passToken})});
const data=await res.json();
if(data.token){localStorage.token=data.token;localStorage.userId=data.userId;showOnboard()}else toast(data.error)
}
async function doSignup(d,passToken){
const res=await fetch(API+'/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...d,passToken})});
const data=await res.json();
if(data.token){localStorage.token=data.token;localStorage.userId=data.userId;showOnboard()}else toast(data.error)
}
async function doForgot(d,passToken){
await fetch(API+'/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...d,passToken})});
const otp=prompt('Enter OTP');
const newPass=prompt('New Password');
await fetch(API+'/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:d.email,otp,newPassword:newPass})});
toast('Password Reset');showTab('login', document.querySelectorAll('.tab')[0])
}

const categories=['Comedy','Tech','Lifestyle','Music','Novels','News'];
const chipsDiv=document.getElementById('chips');
categories.forEach(c=>{const div=document.createElement('div');div.className='chip';div.innerText=c;div.onclick=()=>div.classList.toggle('active');chipsDiv.appendChild(div)})

function showOnboard(){document.getElementById('onboard-modal').classList.add('active')}
async function finishOnboard(){
const selected=[...document.querySelectorAll('.chip.active')].map(c=>c.innerText).slice(0,3);
const role=document.querySelector('input[name="role"]:checked').value;
const country=document.getElementById('country').value;
localStorage.onboarding_data=JSON.stringify({categories:selected,role,country});
await requestPush();
window.location.href='index.html';
}

function urlBase64ToUint8Array(base64String) {
const padding = '='.repeat((4 - base64String.length % 4) % 4);
const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
const rawData = window.atob(base64);
const outputArray = new Uint8Array(rawData.length);
for (let i = 0; i < rawData.length; ++i) {
outputArray[i] = rawData.charCodeAt(i);
}
return outputArray;
}

async function requestPush(){
try {
const reg=await navigator.serviceWorker.register('/sw.js');
// REPLACE THIS WITH YOUR REAL VAPID PUBLIC KEY
const vapidKey = 'BEl0YourPublicKeyHere';
const convertedKey = urlBase64ToUint8Array(vapidKey);
const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:convertedKey});
await fetch(API+'/api/push/subscribe',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.token,'Content-Type':'application/json'},body:JSON.stringify({subscription:sub})});
} catch(err) {
console.error('Push notification error:', err);
}
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
</body>
</html>
