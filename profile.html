<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Profile</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.6);--text:#fff;--muted:#888;--border:#1a1a1a;
  --green:#00ff88;--purple:#a855f7;--pink:#ec4899;--blue:#3b82f6;--orange:#f97316;
  --gradient:linear-gradient(135deg,#00ff88,#3b82f6,#a855f7)
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100dvh}
header{padding:16px;display:flex;justify-content:space-between;align-items:center;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;cursor:pointer}
.profile{padding:24px 20px;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(0,255,136,0.1),transparent 70%)}
.avatar{width:100px;height:100px;border-radius:50%;background:var(--gradient);padding:3px;margin:0 auto;box-shadow:0 0 30px rgba(0,255,136,0.4)}
.avatar img{width:100%;height:100%;border-radius:50%;background:var(--card);object-fit:cover}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;margin-top:8px;margin-right:4px}
.badge.verified{background:var(--blue);color:#fff}
.badge.creator{background:var(--purple);color:#fff}
.stats{display:flex;justify-content:space-around;margin:20px 0}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:14px;padding:12px;border-radius:16px;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);flex:1;margin:0 4px}
.stat b{font-size:18px;color:var(--green)}
.tabs{display:flex;gap:8px;padding:0 12px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;color:var(--muted);cursor:pointer;display:flex;gap:6px;align-items:center;white-space:nowrap;font-weight:700;border-radius:12px 12px 0 0}
.tab.active{color:#000;background:var(--gradient)}
.content{padding:16px}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card.wallet{background:linear-gradient(135deg,rgba(59,130,246,0.1),transparent)}
.card.gifts{background:linear-gradient(135deg,rgba(236,72,153,0.1),transparent)}
.card.support{background:linear-gradient(135deg,rgba(168,85,247,0.1),transparent)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.grid-item{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:12px}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:12px;margin-bottom:10px;outline:none}
.input:focus{border-color:var(--green)}
.btn{background:var(--gradient);color:#000;border:none;padding:12px;border-radius:12px;font-weight:900;width:100%;cursor:pointer;font-size:16px}
.btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.progress{height:10px;background:var(--card);border-radius:10px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:var(--gradient);border-radius:10px;transition:0.3s}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:200}
.modal.active{display:flex}
.glass-modal{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:24px;width:90%;max-width:400px}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--green);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
.gift-card{display:flex;align-items:center;gap:12px;padding:16px;border-radius:16px;margin-bottom:10px;cursor:pointer;border:2px solid transparent;transition:0.2s}
.gift-card:hover{border-color:var(--green);transform:translateY(-2px)}
</style>
</head>
<body>
<header>
<svg onclick="location.href='index.html'" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
<b id="username">@user</b>
<svg onclick="logout()" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
</header>

<div id="toast" class="toast"></div>

<div class="profile">
<div class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff88'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E"></div>
<h2 id="username-display" style="margin:8px 0"></h2>
<div id="badges"></div>
<div class="stats">
<div class="stat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><b id="posts">0</b><span>Posts</span></div>
<div class="stat"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><b id="followers">0</b><span>Followers</span></div>
<div class="stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><b id="likes">0</b><span>Likes</span></div>
</div>
<button id="follow-btn" class="btn" onclick="toggleFollow()">Follow</button>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('posts',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Posts</div>
<div class="tab" onclick="showTab('wallet',this)"><svg viewBox="0 0 24 24"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/><path d="M16 5h6v6"/><circle cx="18" cy="15" r="3"/></svg>Wallet</div>
<div class="tab" onclick="showTab('gifts',this)"><svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>Gifts</div>
<div class="tab" onclick="showTab('support',this)"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Support</div>
</div>

<div class="content">
<div id="tab-posts"></div>
<div id="tab-wallet" style="display:none"></div>
<div id="tab-gifts" style="display:none"></div>
<div id="tab-support" style="display:none"></div>
</div>

<div id="otp-modal" class="modal"><div class="glass-modal">
<h3 style="margin-bottom:12px">Verify Withdrawal</h3>
<p style="color:var(--muted);margin-bottom:12px">Enter OTP sent to your email</p>
<input class="input" id="otp-input" placeholder="123456">
<button class="btn" onclick="confirmWithdraw()">Confirm Withdraw</button>
</div></div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
if(!TOKEN) location.href='auth.html';
const profileId=new URLSearchParams(location.search).get('id')||localStorage.userId;
const isSelf=profileId===localStorage.userId;
let pendingWithdraw=null;

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
async function api(path,opt={}){try{const res=await fetch(API+path,{...opt,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...opt.headers}});if(res.status===401)location.href='auth.html';return res.json()}catch{toast('Network error');return {}}}

function getPercent(str){if(!str)return 0;const [a,b]=str.split('/').map(Number);return b?Math.min(100,Math.round(a/b*100)):0}

// LOAD PROFILE
async function loadProfile(){
const u=await api(`/api/user/${profileId}`);
document.getElementById('username').innerText='@'+u.username;
document.getElementById('username-display').innerText=u.username;
document.getElementById('posts').innerText=u.totalPosts||0;
document.getElementById('followers').innerText=u.followers||0;
document.getElementById('likes').innerText=u.totalLikes||0;

let badges='';
if(u.isVerified) badges+=`<span class="badge verified">Verified</span>`;
if(u.dmUnlocked) badges+=`<span class="badge creator">Creator</span>`;
document.getElementById('badges').innerHTML=badges;

if(!isSelf)document.getElementById('follow-btn').innerText=u.isFollowing?'Unfollow':'Follow';
else document.getElementById('follow-btn').style.display='none';
loadPosts();
}

async function loadPosts(){
const d=await api(`/api/user/${profileId}/posts`);
document.getElementById('tab-posts').innerHTML=`<div class="grid">${(d||[]).map(()=>`<div class="grid-item"></div>`).join('')}</div>`;
}

function showTab(tab,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
document.querySelectorAll('[id^=tab-]').forEach(d=>d.style.display='none');
document.getElementById('tab-'+tab).style.display='block';
if(tab==='wallet')loadWallet();
if(tab==='gifts')loadGifts();
if(tab==='support')loadSupport();
}

// WALLET
async function loadWallet(){
const w=await api('/api/wallet');
const cap=getPercent(w.dailyCapProgress); const days=getPercent(w.daysProgress); const foll=getPercent(w.followersProgress);
document.getElementById('tab-wallet').innerHTML=`
<div class="card wallet"><b>Free Credits: ${w.freeCredits}</b></div>
<div class="card wallet"><b>Cash Balance: ₦${w.cashBalance}</b></div>
<div class="card wallet">
<p>Daily Cap ${w.dailyCapProgress}</p><div class="progress"><div class="progress-bar" style="width:${cap}%"></div></div>
<p>Days to Monetize ${w.daysProgress}</p><div class="progress"><div class="progress-bar" style="width:${days}%"></div></div>
<p>Followers ${w.followersProgress}</p><div class="progress"><div class="progress-bar" style="width:${foll}%"></div></div>
</div>
<div class="card wallet">
<button class="btn" onclick="deposit(1500)">Deposit ₦1500 = 15,000 pts</button>
<button class="btn" onclick="deposit(7000)">Deposit ₦7000 = 70,000 pts</button>
<button class="btn secondary" onclick="unlockDM()">Unlock DM ₦3000</button>
</div>
<div class="card wallet">
<p style="margin-bottom:8px;font-weight:800">Withdraw Cash</p>
<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Min: 50,000 pts = ₦5000</p>
<input class="input" id="withdraw-amount" type="number" placeholder="Amount in Points">

<select class="input" id="withdraw-method" onchange="toggleWithdrawFields()">
  <option value="BANK">Bank Transfer - Naira</option>
  <option value="USDT">USDT TRC20 - $10 / $100 only</option>
</select>

<div id="bank-fields">
  <input class="input" id="bank-name" placeholder="Bank Name e.g GTBank">
  <input class="input" id="account-number" placeholder="Account Number">
  <input class="input" id="account-name" placeholder="Account Name">
</div>

<div id="usdt-fields" style="display:none">
  <input class="input" id="usdt-address" placeholder="TRC20 Address starts with T">
</div>

<button class="btn" onclick="requestWithdraw()">Request Withdraw</button>
</div>`;
}

function toggleWithdrawFields(){
  const method = document.getElementById('withdraw-method').value;
  document.getElementById('bank-fields').style.display = method==='BANK'?'block':'none';
  document.getElementById('usdt-fields').style.display = method==='USDT'?'block':'none';
}

async function deposit(amount){const d=await api('/api/deposit/init',{method:'POST',body:JSON.stringify({tierAmount:amount})});if(d.selarLink)window.open(d.selarLink)}
async function unlockDM(){const d=await api('/api/dm/init',{method:'POST'});if(d.selarLink)window.open(d.selarLink)}

async function requestWithdraw(){
const amount=document.getElementById('withdraw-amount').value; 
const method=document.getElementById('withdraw-method').value; 

if(Number(amount) < 50000) return toast('Min withdrawal is 50,000 pts');

let targetDetails = {};
if(method==='BANK'){
  const bankName=document.getElementById('bank-name').value;
  const accountNumber=document.getElementById('account-number').value;
  const accountName=document.getElementById('account-name').value;
  if(!bankName||!accountNumber||!accountName) return toast('Fill all bank details');
  targetDetails = {bankName, accountNumber, accountName};
}else{
  const usdt=document.getElementById('usdt-address').value;
  if(!usdt) return toast('Enter TRC20 Address');
  if(Number(amount)!==120000 && Number(amount)!==12000000) return toast('USDT only 120k or 12M pts');
  targetDetails = usdt;
}

pendingWithdraw={amountPoints:Number(amount),method,targetDetails};
const res=await api('/api/wallet/withdraw',{method:'POST',body:JSON.stringify(pendingWithdraw)});
if(res.authChallenge)document.getElementById('otp-modal').classList.add('active');
else if(res.error) toast(res.error);
}

async function confirmWithdraw(){
const otpVal=document.getElementById('otp-input').value;
const res=await api('/api/wallet/withdraw/confirm',{method:'POST',body:JSON.stringify({...pendingWithdraw,otp:otpVal})});
if(res.transactionAcknowledged){toast('Withdraw Requested');loadWallet()}
else toast(res.error || 'Failed');
document.getElementById('otp-modal').classList.remove('active');
}

// GIFTS
function loadGifts(){
document.getElementById('tab-gifts').innerHTML=`
<div class="card gifts gift-card" onclick="buyGift('RUBY')" style="background:linear-gradient(135deg,rgba(236,72,153,0.2),transparent)">
<svg viewBox="0 0 24 24" style="color:#ec4899"><path d="M6 3h12l4 6-10 13L2 9l4-6z"/></svg><div><b>RUBY</b><p style="color:var(--muted)">₦5000 - 200pts x 100 gifts</p></div></div>
<div class="card gifts gift-card" onclick="buyGift('GOLD')" style="background:linear-gradient(135deg,rgba(234,179,8,0.2),transparent)">
<svg viewBox="0 0 24 24" style="color:#eab308"><circle cx="12" cy="12" r="10"/></svg><div><b>GOLD</b><p style="color:var(--muted)">₦10000 - 500pts x 100 gifts</p></div></div>
<div class="card gifts gift-card" onclick="buyGift('DIAMOND')" style="background:linear-gradient(135deg,rgba(59,130,246,0.2),transparent)">
<svg viewBox="0 0 24 24" style="color:#3b82f6"><path d="M2 9l10 13L22 9"/></svg><div><b>DIAMOND</b><p style="color:var(--muted)">₦15000 - 1000pts x 100 gifts</p></div></div>`;
}
async function buyGift(type){const d=await api('/api/gift/init',{method:'POST',body:JSON.stringify({giftType:type})});if(d.selarLink)window.open(d.selarLink)}
window.sendGift=async(userId,giftType='RUBY')=>{const res=await api('/api/gift/send',{method:'POST',body:JSON.stringify({receiverId:userId,giftType})});if(res.success)toast('Gift Sent!')}

// SUPPORT
async function loadSupport(){
document.getElementById('tab-support').innerHTML=`
<div class="card support"><input class="input" id="support-subject" placeholder="Subject">
<textarea class="input" id="support-msg" placeholder="Describe your issue" rows="4"></textarea>
<button class="btn" onclick="sendSupport()">Send Ticket</button></div>
<div id="tickets"></div>`;
const t=await api('/api/support/my');
document.getElementById('tickets').innerHTML=(t||[]).map(x=>`<div class="card support"><b>${x.subject}</b><p style="color:${x.status==='RESOLVED'?'var(--green)':'var(--orange)'}">${x.status}</p></div>`).join('');
}
async function sendSupport(){
const subject=document.getElementById('support-subject').value;
const message=document.getElementById('support-msg').value;
await api('/api/support/send',{method:'POST',body:JSON.stringify({subject,message})});
toast('Ticket sent');loadSupport();
}

// FOLLOW
async function toggleFollow(){
const btn=document.getElementById('follow-btn');
if(btn.innerText==='Follow'){await api('/api/follow',{method:'POST',body:JSON.stringify({followingId:profileId})});btn.innerText='Unfollow';toast('Following')}
else{await api('/api/unfollow',{method:'POST',body:JSON.stringify({followingId:profileId})});btn.innerText='Follow';toast('Unfollowed')}
}

function logout(){localStorage.clear();location.href='auth.html'}

loadProfile();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/golviral-frontend/sw.js').catch(()=>{})}
</script>
</body>
</html>
