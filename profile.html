<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolViral - Profile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }
        /* Profile Header Header Card */
        .profile-card {
            padding: 25px 15px;
            background: linear-gradient(to bottom, #111111, #0A0A0A);
            border-bottom: 1px solid #1F1F1F;
            text-align: center;
        }
        .avatar {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background-color: #222222;
            margin: 0 auto 12px auto;
            border: 2px solid #00C853;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .username {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        /* Stats Dashboard Counters */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .stat-val {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
        }
        .stat-lbl {
            font-size: 12px;
            color: #888888;
            margin-top: 2px;
            text-transform: uppercase;
        }
        /* Profile Action Row */
        .action-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 0 20px;
        }
        .edit-btn, .wallet-btn {
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .wallet-btn {
            background-color: #00C853;
            border-color: #00C853;
            color: #000000;
            font-weight: 700;
        }
        /* Tab Architecture Component */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid #1F1F1F;
            background-color: #0A0A0A;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            color: #888888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #FFFFFF;
            border-bottom-color: #FFFFFF;
        }
        /* Display Panes */
        .pane {
            display: none;
            padding: 15px;
        }
        .pane.active {
            display: block;
        }
        /* Grid Display Pane for Posts */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        .grid-thumb {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background-color: #161616;
            cursor: pointer;
        }
        .grid-thumb img, .grid-thumb video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .grid-type-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
        }
        /* List Architecture Component for Followers / Following */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .user-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #111111;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #1F1F1F;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .small-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #2A2A2A;
        }
        .list-name {
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
        }
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 60px;
            background: #0A0A0A;
            border-top: 1px solid #1F1F1F;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item.active {
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <header class="profile-card">
        <div class="avatar" id="userAvatar">👤</div>
        <h2 class="username" id="profileUsername">@loading</h2>
        
        <div class="stats-row">
            <div class="stat-item" onclick="switchPane('posts')">
                <span class="stat-val" id="countPosts">0</span>
                <span class="stat-lbl">Posts</span>
            </div>
            <div class="stat-item" onclick="switchPane('followers')">
                <span class="stat-val" id="countFollowers">0</span>
                <span class="stat-lbl">Followers</span>
            </div>
            <div class="stat-item" onclick="switchPane('following')">
                <span class="stat-val" id="countFollowing">0</span>
                <span class="stat-lbl">Following</span>
            </div>
        </div>

        <div class="action-row">
            <a href="wallet.html" class="wallet-btn">Open Wallet</a>
            <a href="settings.html" class="edit-btn">Settings</a>
        </div>
    </header>

    <nav class="tab-bar">
        <div class="tab active" id="tab-posts" onclick="switchPane('posts')">Posts</div>
        <div class="tab" id="tab-followers" onclick="switchPane('followers')">Followers</div>
        <div class="tab" id="tab-following" onclick="switchPane('following')">Following</div>
    </nav>

    <main>
        <div id="pane-posts" class="pane active">
            <div class="posts-grid" id="profileGrid"></div>
        </div>

        <div id="pane-followers" class="pane">
            <div class="user-list" id="followersList">
                </div>
        </div>

        <div id="pane-following" class="pane">
            <div class="user-list" id="followingList">
                </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>Feed</span></a>
        <a href="explore.html" class="nav-item"><span>🔍</span><span>Explore</span></a>
        <a href="post.html" class="nav-item"><span>➕</span><span>Post</span></a>
        <a href="reels.html" class="nav-item"><span>🎬</span><span>Reels</span></a>
        <a href="profile.html" class="nav-item active"><span>👤</span><span>Profile</span></a>
    </nav>

    <script>
        const API_BASE = "https://api.golviral.com";
        const token = localStorage.getItem("token") || "";

        async function fetchProfileData() {
            try {
                const res = await fetch(`${API_BASE}/profile`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Could not load account matrix components.");
                const data = await res.json();

                // Hydrate details elements
                document.getElementById("profileUsername").innerText = `@${data.username || 'user'}`;
                document.getElementById("countPosts").innerText = data.postsCount || 0;
                document.getElementById("countFollowers").innerText = data.followersCount || 0;
                document.getElementById("countFollowing").innerText = data.followingCount || 0;

                renderUserMediaGrid(data.posts || []);
                renderRelationList(data.followers || [], "followersList");
                renderRelationList(data.following || [], "followingList");

            } catch (err) {
                console.error(err);
                alert("Session integration mismatch. Please sign in again.");
            }
        }

        function renderUserMediaGrid(posts) {
            const grid = document.getElementById("profileGrid");
            grid.innerHTML = "";

            if(posts.length === 0) {
                grid.style.display = "block";
                grid.innerHTML = `<p style="color:#666; text-align:center; padding:40px 0; font-size:14px;">No posts created yet.</p>`;
                return;
            }

            posts.forEach(post => {
                const item = document.createElement("div");
                item.className = "grid-thumb";
                
                let preview = `<img src="${post.thumbnailUrl || 'https://via.placeholder.com/150?text=GolViral'}" alt="Thumb" loading="lazy">`;
                let badgeText = post.type.toUpperCase();

                item.innerHTML = `
                    ${preview}
                    <div class="grid-type-badge">${badgeText}</div>
                `;

                // Item routing map logic 
                item.onclick = () => {
                    if (post.type === 'reel') window.location.href = `reels.html?id=${post.id}`;
                    else if (post.type === 'novel') window.location.href = `novel.html?id=${post.id}`;
                    else if (post.type === 'story') window.location.href = `story.html?id=${post.id}`;
                };

                grid.appendChild(item);
            });
        }

        function renderRelationList(users, targetContainerId) {
            const container = document.getElementById(targetContainerId);
            container.innerHTML = "";

            if(users.length === 0) {
                container.innerHTML = `<p style="color:#666; text-align:center; padding:20px 0; font-size:13px;">Empty context list.</p>`;
                return;
            }

            users.forEach(u => {
                const wrapper = document.createElement("div");
                wrapper.className = "user-list-item";
                wrapper.innerHTML = `
                    <div class="user-info">
                        <div class="small-avatar"></div>
                        <span class="list-name">@${u.username}</span>
                    </div>
                    <a href="user.html?id=${u.id}" class="edit-btn" style="padding:4px 10px; font-size:11px;">View</a>
                `;
                container.appendChild(wrapper);
            });
        }

        function switchPane(paneType) {
            // Discard prior states
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".pane").forEach(p => p.classList.remove("active"));

            // Apply targeted visibility switches
            document.getElementById(`tab-${paneType}`).classList.add("active");
            document.getElementById(`pane-${paneType}`).classList.add("active");
        }

        // Initialize view assembly mapping
        fetchProfileData();
    </script>
</body>
</html>
