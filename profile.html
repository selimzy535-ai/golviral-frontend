<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Profile</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.7);--accent:#00ff88;--text:#fff;--muted:#888;--border:#1a1a1a}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto}
header{padding:16px;display:flex;justify-content:space-between;align-items:center}
svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.profile{padding:20px;text-align:center}
.avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#00cc6a);padding:3px;margin:0 auto}
.avatar img{width:100%;height:100%;border-radius:50%;background:var(--card)}
.stats{display:flex;justify-content:space-around;margin:20px 0}
.stat{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:14px}
.tabs{display:flex;gap:20px;padding:0 20px;border-bottom:1px solid var(--border)}
.tab{padding:12px 0;color:var(--muted);cursor:pointer;display:flex;gap:6px;align-items:center}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.content{padding:20px}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.grid-item{aspect-ratio:1;background:var(--card);border-radius:8px}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:12px;margin-bottom:10px}
.btn{background:var(--accent);color:#000;border:none;padding:12px;border-radius:12px;font-weight:800;width:100%;cursor:pointer}
.progress{height:8px;background:var(--card);border-radius:10px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;background:var(--accent)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:200}
.glass-modal{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:20px;width:90%}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<header>
<svg onclick="location.href='index.html'" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
<b id="username">@user</b>
<svg onclick="logout()" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
</header>

<div id="toast" class="toast"></div>

<div class="profile">
<div class="avatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff88'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E"></div>
<h2 id="bio" style="margin:8px 0;color:var(--muted)"></h2>
<div class="stats">
<div class="stat"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><b id="posts">0</b><span>Posts</span></div>
<div class="stat"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><b id="followers">0</b><span>Followers</span></div>
<div class="stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><b id="likes">0</b><span>Likes</span></div>
</div>
<button id="follow-btn" class="btn" onclick="toggleFollow()">Follow</button>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('posts',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Posts</div>
<div class="tab" onclick="showTab('wallet',this)"><svg viewBox="0 0 24 24"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/><path d="M16 5h6v6"/><circle cx="18" cy="15" r="3"/></svg>Wallet</div>
<div class="tab" onclick="showTab('gifts',this)"><svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>Gifts</div>
<div class="tab" onclick="showTab('support',this)"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Support</div>
<div class="tab" id="admin-tab" style="display:none" onclick="showTab('admin',this)"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Admin</div>
</div>

<div class="content">
<div id="tab-posts"></div>
<div id="tab-wallet" style="display:none"></div>
<div id="tab-gifts" style="display:none"></div>
<div id="tab-support" style="display:none"></div>
<div id="tab-admin" style="display:none"></div>
</div>

<!-- OTP MODAL -->
<div id="otp-modal" class="modal"><div class="glass-modal">
<h3>Enter OTP</h3>
<input class="input" id="otp-input" placeholder="OTP from email">
<button class="btn" onclick="confirmWithdraw()">Confirm</button>
</div></div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
if(!TOKEN) location.href='auth.html';
const profileId=new URLSearchParams(location.search).get('id')||localStorage.userId;
const isSelf=profileId===localStorage.userId;
let pendingWithdraw=null;

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
async function api(path,opt={}){const res=await fetch(API+path,{...opt,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...opt.headers}});if(res.status===401)location.href='auth.html';return res.json()}

// LOAD PROFILE
async function loadProfile(){
const u=await api(`/api/user/${profileId}`);
document.getElementById('username').innerText='@'+u.username;
document.getElementById('bio').innerText=u.bio||'';
document.getElementById('posts').innerText=u.totalPosts||0;
document.getElementById('followers').innerText=u.followers||0;
document.getElementById('likes').innerText=u.totalLikes||0;
if(u.role==='admin')document.getElementById('admin-tab').style.display='flex';
if(!isSelf)document.getElementById('follow-btn').innerText=u.isFollowing?'Unfollow':'Follow';
else document.getElementById('follow-btn').style.display='none';
loadPosts();
}

async function loadPosts(){
const d=await api(`/api/user/${profileId}/posts`);
document.getElementById('tab-posts').innerHTML=`<div class="grid">${d.posts.map(p=>`<div class="grid-item"></div>`).join('')}</div>`;
}

function showTab(tab,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
document.querySelectorAll('[id^=tab-]').forEach(d=>d.style.display='none');
document.getElementById('tab-'+tab).style.display='block';
if(tab==='wallet')loadWallet();
if(tab==='gifts')loadGifts();
if(tab==='support')loadSupport();
}

// WALLET
async function loadWallet(){
const w=await api('/api/wallet');
document.getElementById('tab-wallet').innerHTML=`
<div class="card"><b>Free Credits: ${w.freeCredits}</b></div>
<div class="card"><b>Cash Balance: ₦${w.cashBalance}</b></div>
<div class="card">
<p>Daily Cap ${w.dailyCapProgress}%</p><div class="progress"><div class="progress-bar" style="width:${w.dailyCapProgress}%"></div></div>
<p>Days ${w.daysProgress}%</p><div class="progress"><div class="progress-bar" style="width:${w.daysProgress}%"></div></div>
<p>Followers ${w.followersProgress}%</p><div class="progress"><div class="progress-bar" style="width:${w.followersProgress}%"></div></div>
</div>
<div class="card">
<button class="btn" onclick="deposit(1500)">Deposit ₦1500</button>
<button class="btn" onclick="deposit(7000)">Deposit ₦7000</button>
<button class="btn" onclick="unlockDM()">Unlock DM ₦3000</button>
</div>
<div class="card">
<input class="input" id="withdraw-amount" placeholder="Amount in Points">
<input class="input" id="withdraw-method" placeholder="USDT_TRC20">
<input class="input" id="withdraw-target" placeholder="TRC20 Address">
<button class="btn" onclick="requestWithdraw()">Withdraw</button>
</div>`;
}

async function deposit(amount){const d=await api('/api/deposit/init',{method:'POST',body:JSON.stringify({tierAmount:amount})});window.open(d.selarLink)}
async function unlockDM(){const d=await api('/api/dm/init',{method:'POST'});window.open(d.selarLink)}
async function requestWithdraw(){
const amount=withdraw-amount.value; const method=withdraw-method.value; const target=withdraw-target.value;
if(method==='USDT_TRC20' && amount!=120000 && amount!=12000000)return toast('USDT min 120k or 12M');
pendingWithdraw={amountPoints:amount,method,targetDetails:target};
const res=await api('/api/wallet/withdraw',{method:'POST',body:JSON.stringify(pendingWithdraw)});
if(res.otpRequired)document.getElementById('otp-modal').style.display='flex';
}
async function confirmWithdraw(){
await api('/api/wallet/withdraw/confirm',{method:'POST',body:JSON.stringify({...pendingWithdraw,otp:otp-input.value})});
toast('Withdraw Requested');document.getElementById('otp-modal').style.display='none';
}

// GIFTS
function loadGifts(){
document.getElementById('tab-gifts').innerHTML=`
<div class="card" onclick="buyGift('RUBY')"><svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 13L2 9l4-6z"/></svg><b>RUBY</b><p>₦5000</p></div>
<div class="card" onclick="buyGift('GOLD')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg><b>GOLD</b><p>₦10000</p></div>
<div class="card" onclick="buyGift('DIAMOND')"><svg viewBox="0 0 24 24"><path d="M2 9l10 13L22 9"/></svg><b>DIAMOND</b><p>₦15000</p></div>`;
}
async function buyGift(type){await api('/api/gift/init',{method:'POST',body:JSON.stringify({giftType:type})});toast('Gift sent')}
window.sendGift=async(userId,giftType='RUBY')=>{await api('/api/gift/send',{method:'POST',body:JSON.stringify({receiverId:userId,giftType})}

// SUPPORT
async function loadSupport(){
document.getElementById('tab-support').innerHTML=`
<div class="card"><input class="input" id="support-subject" placeholder="Subject">
<textarea class="input" id="support-msg" placeholder="Message"></textarea>
<button class="btn" onclick="sendSupport()">Send Ticket</button></div>
<div id="tickets"></div>`;
const t=await api('/api/support/my');
document.getElementById('tickets').innerHTML=t.tickets.map(x=>`<div class="card"><b>${x.subject}</b><p>${x.status}</p></div>`).join('');
}
async function sendSupport(){await api('/api/support/send',{method:'POST',body:JSON.stringify({subject:support-subject.value,message:support-msg.value})});toast('Ticket sent')}

// FOLLOW
async function toggleFollow(){
const btn=document.getElementById('follow-btn');
if(btn.innerText==='Follow'){await api('/api/follow',{method:'POST',body:JSON.stringify({followingId:profileId})});btn.innerText='Unfollow'}
else{await api('/api/unfollow',{method:'POST',body:JSON.stringify({followingId:profileId})});btn.innerText='Follow'}
}

function logout(){localStorage.clear();location.href='auth.html'}

loadProfile();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
</body>
</html>
