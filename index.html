<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golviral Feed</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg: #FFFFFF;
  --text: #000;
  --accent: #FF0050;
  --border: #EAEAEA;
  --nav-height: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding-bottom: var(--nav-height);
  overflow-x: hidden;
}

.tab-section { display: none; }
.tab-section.active { display: block; }

/* FEED TAB */
.feed-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 900;
  font-size: 20px;
  z-index: 10;
}
.feed-header span { color: var(--accent); }

.post-card {
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.post-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px 8px;
}
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}
.username {
  font-weight: 700;
  font-size: 14px;
  flex: 1;
}

.video-wrap {
  position: relative;
  width: 100%;
  background: #000;
}
video {
  width: 100%;
  max-height: 80vh;
  object-fit: contain;
  background: #000;
}
.cached-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  display: none;
}
.cached-badge.show { display: block; }

.post-actions {
  display: flex;
  gap: 20px;
  padding: 8px 16px;
}
.action-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.action-btn.liked { color: var(--accent); }

/* REELS TAB */
#reels-tab {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}
.reel {
  width: 100vw;
  height: 100vh;
  scroll-snap-align: start;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reel video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.reel-side-actions {
  position: absolute;
  right: 12px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  color: #fff;
}
.reel-side-actions button {
  background: none;
  border: none;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

/* EXPLORE TAB */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  padding: 2px;
}
.explore-item {
  aspect-ratio: 9/16;
  background: var(--border);
  position: relative;
  overflow: hidden;
}
.explore-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.explore-views {
  position: absolute;
  bottom: 4px;
  left: 4px;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
}
.nav-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  color: #666;
  cursor: pointer;
  font-size: 10px;
}
.nav-btn.active { color: var(--text); }

/* A2HS Banner */
.a2hs-banner {
  position: fixed;
  bottom: calc(var(--nav-height) + 12px);
  left: 12px;
  right: 12px;
  background: var(--text);
  color: var(--bg);
  padding: 12px 16px;
  border-radius: 12px;
  display: none;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 600;
  z-index: 99;
}
.a2hs-banner.show { display: flex; }
.a2hs-banner button {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>
<body>

<!-- FEED TAB -->
<section id="feed-tab" class="tab-section active">
  <div class="feed-header">Gol<span>viral</span></div>
  <div id="feed-list">
    <div class="loading">Loading feed...</div>
  </div>
</section>

<!-- REELS TAB -->
<section id="reels-tab" class="tab-section">
  <div id="reels-list"></div>
</section>

<!-- EXPLORE TAB -->
<section id="explore-tab" class="tab-section">
  <div class="explore-grid" id="explore-grid"></div>
</section>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('feed')">
    <i data-lucide="home"></i>
    <span>Feed</span>
  </button>
  <button class="nav-btn" onclick="switchTab('reels')">
    <i data-lucide="play-square"></i>
    <span>Reels</span>
  </button>
  <button class="nav-btn" onclick="switchTab('explore')">
    <i data-lucide="compass"></i>
    <span>Explore</span>
  </button>
  <button class="nav-btn" onclick="location.href='post.html'">
    <i data-lucide="plus-square"></i>
    <span>Post</span>
  </button>
  <button class="nav-btn" onclick="location.href='profile.html'">
    <i data-lucide="user"></i>
    <span>Profile</span>
  </button>
</nav>

<!-- A2HS Banner -->
<div class="a2hs-banner" id="a2hs-banner">
  <span>Install Golviral for offline access</span>
  <button id="a2hs-btn">Install</button>
</div>

<script>
const API_BASE = "https://golviral-api.onrender.com/api";
let deferredPrompt = null;
let visitCount = parseInt(localStorage.getItem('visitCount') || '0') + 1;
localStorage.setItem('visitCount', visitCount);
let viewedReels = new Set();

document.addEventListener("DOMContentLoaded", () => {
  lucide.createIcons();
  loadFeed();
  loadReels();
  loadExplore();
  
  if (visitCount >= 3) showA2HSBanner();
});

// TAB SWITCHER
function switchTab(tab) {
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(`${tab}-tab`).classList.add('active');
  event.currentTarget.classList.add('active');
}

// FEED LOADER
async function loadFeed() {
  try {
    const res = await fetch(`${API_BASE}/feed`);
    const posts = await res.json();
    
    const html = posts.map(p => `
      <div class="post-card" data-postid="${p.id}" data-userid="${p.userId}">
        <div class="post-head">
          <div class="avatar">${p.userId.slice(0,2).toUpperCase()}</div>
          <div class="username" onclick="location.href='profile.html?id=${p.userId}'">@user${p.userId.slice(0,6)}</div>
        </div>
        <div class="video-wrap">
          <video src="${p.mediaUrl}" poster="${p.thumbnailUrl}" controls playsinline preload="metadata"></video>
          <div class="cached-badge">Cached</div>
        </div>
        <div class="post-actions">
          <button class="action-btn like-btn" onclick="likePost('${p.id}', '${p.userId}', this)">
            <i data-lucide="heart"></i>
            <span>${p.likes}</span>
          </button>
          <button class="action-btn" onclick="alert('Comment modal here')">
            <i data-lucide="message-circle"></i>
            <span>${p.comments}</span>
          </button>
          <button class="action-btn">
            <i data-lucide="eye"></i>
            <span>${p.views}</span>
          </button>
        </div>
      </div>
    `).join('');
    
    document.getElementById('feed-list').innerHTML = html;
    lucide.createIcons();
    
    // Track 3s views
    document.querySelectorAll('#feed-list video').forEach(v => {
      let timer;
      v.addEventListener('play', () => {
        timer = setTimeout(() => trackView(v.closest('.post-card').dataset.postid, v.closest('.post-card').dataset.userid), 3000);
      });
      v.addEventListener('pause', () => clearTimeout(timer));
    });
    
  } catch(e) {
    document.getElementById('feed-list').innerHTML = '<div class="loading">Failed to load feed</div>';
  }
}

// REELS LOADER
async function loadReels() {
  try {
    const res = await fetch(`${API_BASE}/feed`);
    const posts = await res.json();
    
    const html = posts.map(p => `
      <div class="reel" data-postid="${p.id}" data-userid="${p.userId}">
        <video src="${p.mediaUrl}" poster="${p.thumbnailUrl}" playsinline loop muted></video>
        <div class="reel-side-actions">
          <button onclick="likePost('${p.id}', '${p.userId}', this)">
            <i data-lucide="heart"></i>
            <span>${p.likes}</span>
          </button>
          <button onclick="alert('Comment')">
            <i data-lucide="message-circle"></i>
            <span>${p.comments}</span>
          </button>
          <button onclick="navigator.share({title:'Golviral', url:'profile.html?id=${p.userId}'})">
            <i data-lucide="share"></i>
            <span>Share</span>
          </button>
        </div>
      </div>
    `).join('');
    
    document.getElementById('reels-list').innerHTML = html;
    lucide.createIcons();
    
    // Auto play + 3s view tracking
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const video = entry.target.querySelector('video');
        if (entry.isIntersecting) {
          video.play();
          const postId = entry.target.dataset.postid;
          if (!viewedReels.has(postId)) {
            setTimeout(() => {
              trackView(postId, entry.target.dataset.userid);
              viewedReels.add(postId);
            }, 3000);
          }
        } else {
          video.pause();
        }
      });
    }, { threshold: 0.8 });
    
    document.querySelectorAll('.reel').forEach(r => observer.observe(r));
    
  } catch(e) {
    document.getElementById('reels-list').innerHTML = '<div style="color:#fff;text-align:center;padding:50vh 0">Failed to load</div>';
  }
}

// EXPLORE LOADER
async function loadExplore() {
  try {
    const res = await fetch(`${API_BASE}/feed`);
    const posts = await res.json();
    
    const html = posts.map(p => `
      <div class="explore-item" onclick="location.href='profile.html?id=${p.userId}'">
        <video src="${p.thumbnailUrl}" muted></video>
        <div class="explore-views"><i data-lucide="play"></i> ${p.views}</div>
      </div>
    `).join('');
    
    document.getElementById('explore-grid').innerHTML = html;
    lucide.createIcons();
  } catch(e) {}
}

// ENGAGEMENT FUNCTIONS - No bot check required
async function trackView(postId, userId) {
  await fetch(`${API_BASE}/view`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ postId, userId })
  });
}

async function likePost(postId, creatorId, btn) {
  const token = localStorage.getItem('token');
  if (!token) return alert('Login required');
  
  btn.classList.toggle('liked');
  const span = btn.querySelector('span');
  span.textContent = parseInt(span.textContent) + (btn.classList.contains('liked') ? 1 : -1);
  
  await fetch(`${API_BASE}/like`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({ postId, creatorId })
  });
}

// A2HS LOGIC - Inlined to save file
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function showA2HSBanner() {
  if (!deferredPrompt) return;
  const banner = document.getElementById('a2hs-banner');
  banner.classList.add('show');
  document.getElementById('a2hs-btn').onclick = async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    banner.classList.remove('show');
  };
}

// REGISTER SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
