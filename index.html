<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GolViral - Feed</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0A0A">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0A0A0A',
                        accent: '#E50914',
                        surface: '#121212',
                        card: '#1E1E1E'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .feed-container {
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 70px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-brand border-b border-zinc-800 px-4 py-3 flex justify-between items-center max-w-[500px] mx-auto">
        <h1 class="text-xl font-black tracking-wider text-white">GOL<span class="text-accent">VIRAL</span></h1>
        <div class="flex items-center gap-4">
            <span id="headerWallet" class="text-xs font-bold bg-zinc-800 px-2 py-1 rounded border border-zinc-700 text-zinc-300">
                0 pts
            </span>
            <button id="logoutBtn" class="text-zinc-400 hover:text-white text-xs font-semibold">Logout</button>
        </div>
    </header>

    <main class="feed-container px-3 pt-4">
        <div id="systemNotification" class="hidden mb-4 bg-accent/10 border border-accent/20 text-accent text-xs p-3 rounded-lg text-center font-medium animate-pulse"></div>

        <div id="feedPosts" class="space-y-4">
            <div class="feed-skeleton space-y-4">
                <div class="bg-surface border border-zinc-800 rounded-xl p-4 animate-pulse">
                    <div class="flex items-center space-x-3 mb-3">
                        <div class="w-10 h-10 bg-zinc-800 rounded-full"></div>
                        <div class="h-3 bg-zinc-800 rounded w-1/3"></div>
                    </div>
                    <div class="h-48 bg-zinc-800 rounded-xl mb-3"></div>
                    <div class="h-3 bg-zinc-800 rounded w-3/4"></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-brand/95 backdrop-blur-md border-t border-zinc-800 z-50 max-w-[500px] mx-auto">
        <div class="flex justify-around items-center h-16 text-zinc-400">
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-white">
                <svg class="w-5 h-5 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Home</span>
            </a>
            <a href="explore.html" class="flex flex-col items-center justify-center w-full h-full hover:text-white transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Explore</span>
            </a>
            <a href="reels.html" class="flex flex-col items-center justify-center w-full h-full hover:text-white transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Reels</span>
            </a>
            <a href="post.html" class="flex flex-col items-center justify-center w-full h-full hover:text-white transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Post</span>
            </a>
            <a href="wallet.html" class="flex flex-col items-center justify-center w-full h-full hover:text-white transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Wallet</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full hover:text-white transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-[10px] font-medium tracking-wide">Profile</span>
            </a>
        </div>
    </nav>

    <script src="a2hs.js" defer></script>
    <script>
        const API_BASE = 'https://api.golviral.com';

        // Verification & Guard Rails
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'auth.html';
                return;
            }
            
            initFeedApp();
            registerServiceWorker();
        });

        // Initialize App & Load Feeds
        async function initFeedApp() {
            try {
                await fetchUserProfile();
                await fetchMainFeed();
            } catch (err) {
                showNotification('Network initialization issue. Check backend status.');
            }
        }

        // Service Worker Safe Registration
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW running securely.', reg.scope))
                    .catch(err => console.error('SW crash execution skipped.', err));
            }
        }

        // Fetch User Statistics
        async function fetchUserProfile() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_BASE}/api/wallet`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    logout();
                    return;
                }
                if (res.ok) {
                    const data = await res.json();
                    const totalPoints = (data.freeCredits || 0) + (data.monetizedPoints || 0);
                    document.getElementById('headerWallet').innerText = `${totalPoints.toLocaleString()} pts`;
                }
            } catch (e) {
                console.error("Wallet lookup bypassed.");
            }
        }

        // Fetch Main Interaction Feed From Node API Base Gateway
        async function fetchMainFeed() {
            const token = localStorage.getItem('token');
            const feedContainer = document.getElementById('feedPosts');
            
            try {
                const res = await fetch(`${API_BASE}/api/posts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error('API rejection response returned.');
                const posts = await res.json();
                
                feedContainer.innerHTML = '';
                if(posts.length === 0) {
                    feedContainer.innerHTML = `<div class="text-center text-zinc-500 py-12 text-sm">No viral posts found. Try exploring!</div>`;
                    return;
                }

                posts.forEach(post => {
                    const postCard = document.createElement('div');
                    postCard.className = 'bg-surface border border-zinc-800 rounded-xl overflow-hidden shadow-2xl relative';
                    
                    // Dynamic rendering setup handling both types: Media Post or Text Content Block
                    let bodyAssetHtml = '';
                    if (post.type === 'video') {
                        bodyAssetHtml = `
                            <div class="relative aspect-video w-full bg-black">
                                <video src="${post.mediaUrl}" controls class="w-full h-full feed-video-element" data-post-id="${post.id}" preload="metadata" playsinline></video>
                                <span class="absolute top-2 right-2 bg-brand/80 border border-zinc-700 text-[10px] text-zinc-400 font-bold px-2 py-0.5 rounded tracking-wide hidden cached-badge">
                                    Video cached
                                </span>
                            </div>`;
                    } else if (post.type === 'novel' || post.type === 'story') {
                        bodyAssetHtml = `
                            <div class="p-4 border-b border-zinc-800/50 bg-gradient-to-br from-zinc-900 to-brand">
                                <span class="text-[10px] font-bold tracking-wider uppercase px-2 py-0.5 rounded bg-accent/20 text-accent">${post.type}</span>
                                <h3 class="text-base font-bold mt-2 text-white line-clamp-1">${post.title || 'Untitled Writing'}</h3>
                                <p class="text-xs text-zinc-400 mt-1 line-clamp-3 leading-relaxed">${post.content || ''}</p>
                                <a href="${post.type}.html?id=${post.id}" class="inline-block mt-3 text-xs font-bold text-white bg-zinc-800 px-3 py-1.5 rounded border border-zinc-700 hover:bg-zinc-700 transition-all">Read More & Earn</a>
                            </div>`;
                    }

                    postCard.innerHTML = `
                        <div class="flex items-center justify-between p-3 border-b border-zinc-900">
                            <div class="flex items-center space-x-2.5 cursor-pointer" onclick="window.location.href='user.html?id=${post.userId}'">
                                <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-xs uppercase text-zinc-300 border border-zinc-700">
                                    ${post.user?.username?.substring(0, 2) || 'U'}
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold text-zinc-200">@${post.user?.username || 'anonymous'}</h4>
                                    <p class="text-[9px] text-zinc-500">Global Citizen</p>
                                </div>
                            </div>
                        </div>
                        
                        ${bodyAssetHtml}

                        <div class="p-3 bg-zinc-900/40 flex justify-between items-center text-xs text-zinc-400">
                            <div class="flex space-x-4">
                                <button onclick="triggerEngagement('${post.id}', 'like')" class="flex items-center space-x-1.5 group hover:text-white transition-colors">
                                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                    <span class="font-medium text-[11px]">${post.likesCount || 0}</span>
                                </button>
                                <div class="flex items-center space-x-1.5">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                                    <span class="font-medium text-[11px]">${post.commentsCount || 0}</span>
                                </div>
                            </div>
                            <div class="text-[10px] text-zinc-500 font-medium">
                                <span>${post.viewsCount || 0} views</span>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(postCard);
                });

                detectCachedVideos();

            } catch (err) {
                feedContainer.innerHTML = `<div class="text-center text-zinc-500 py-12 text-sm">Failed to assemble streaming content pool feeds.</div>`;
            }
        }

        // Verify with Service Worker Cache via CacheStorage matching API 
        async function detectCachedVideos() {
            if (!('caches' in window)) return;
            const videoElements = document.querySelectorAll('.feed-video-element');
            try {
                const cache = await caches.open('golviral-video-cache-v4.4');
                for (let video of videoElements) {
                    const srcUrl = video.getAttribute('src');
                    if (srcUrl) {
                        const cachedResponse = await cache.match(srcUrl);
                        if (cachedResponse) {
                            const container = video.closest('.relative');
                            if (container) {
                                const badge = container.querySelector('.cached-badge');
                                if (badge) badge.classList.remove('hidden');
                            }
                        }
                    }
                }
            } catch (e) {
                console.error("Cache inspect aborted.");
            }
        }

        // Handle Immediate User Engagements targeting the 10-sec RAM buffer engine
        async function triggerEngagement(postId, action) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_BASE}/api/engagement/${action}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ postId })
                });
                if (response.status === 202) {
                    showNotification('Engagement updated instantly!', false);
                    fetchMainFeed(); // Hot reload local feed view configuration
                } else {
                    const errData = await response.json();
                    showNotification(errData.message || 'Limit exceeded/Action rejected.');
                }
            } catch (err) {
                showNotification('Network engagement pipeline timed out.');
            }
        }

        // Helper Notification Display Context
        function showNotification(msg, isError = true) {
            const banner = document.getElementById('systemNotification');
            banner.innerText = msg;
            banner.classList.remove('hidden');
            if(!isError) {
                banner.classList.replace('bg-accent/10', 'bg-zinc-800');
                banner.classList.replace('text-accent', 'text-emerald-400');
            }
            setTimeout(() => {
                banner.classList.add('hidden');
                // Revert styles
                banner.classList.replace('bg-zinc-800', 'bg-accent/10');
                banner.classList.replace('text-emerald-400', 'text-accent');
            }, 3500);
        }

        // Universal Auth Log Out Closure Handler
        function logout() {
            localStorage.clear();
            window.location.href = 'auth.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);
    </script>
</body>
</html>
