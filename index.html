
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Viral Feed</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#FFFFFF;color:#000;min-height:100vh;padding-bottom:70px}
header{position:sticky;top:0;background:#FFFFFF;border-bottom:1px solid #E0E0E0;padding:12px 16px;z-index:10}
header h1{font-size:20px;font-weight:700}
.feed{max-width:600px;margin:0 auto}
.post{background:#FFFFFF;border-bottom:8px solid #F5F5F5}
.post-header{display:flex;align-items:center;padding:12px 16px}
.post-avatar{width:32px;height:32px;border-radius:50%;background:#DDD;margin-right:10px}
.post-user{font-weight:600;font-size:14px}
.post-media{width:100%;aspect-ratio:9/16;background:#000;position:relative}
.post-media video{width:100%;height:100%;object-fit:cover}
.cached-badge{position:absolute;top:8px;left:8px;background:#00C853;color:#FFF;font-size:10px;padding:3px 6px;border-radius:4px;display:none}
.post-actions{display:flex;align-items:center;padding:8px 16px;gap:20px}
.action-btn{background:none;border:none;font-size:24px;cursor:pointer}
.action-count{font-size:14px;font-weight:600;margin-left:-15px}
nav{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid #E0E0E0;display:flex;justify-content:space-around;padding:8px 0}
nav a{text-decoration:none;color:#8E8E8E;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px}
nav a.active{color:#FF0050}
</style>
</head>
<body>
<header><h1>GolViral</h1></header>

<div class="feed" id="feed">
  <div style="text-align:center;padding:40px;color:#8E8E8E">Loading feed...</div>
</div>

<nav>
  <a href="index.html" class="active">🏠<span>Feed</span></a>
  <a href="explore.html">🔍<span>Explore</span></a>
  <a href="post.html">➕<span>Post</span></a>
  <a href="wallet.html">💰<span>Wallet</span></a>
  <a href="profile.html">👤<span>Profile</span></a>
</nav>

<script>
const API = 'https://golviral-api.onrender.com'; 
const token = localStorage.getItem('token');

async function loadFeed() {
  try {
    const res = await fetch(`${API}/api/feed`);
    const posts = await res.json();
    const feedDiv = document.getElementById('feed');
    
    if(!posts || posts.length === 0) {
      feedDiv.innerHTML = '<div style="text-align:center;padding:40px">No posts yet. Be the first to post!</div>';
      return;
    }
    
    feedDiv.innerHTML = posts.map(p => {
      // Defensive fallback check to avoid crashing on undefined strings
      const displayId = p.userId ? String(p.userId).slice(0, 8) : 'anonymous';
      
      return `
        <div class="post" data-id="${p.id}">
          <div class="post-header">
            <div class="post-avatar"></div>
            <div class="post-user">@${displayId}</div>
          </div>
          <div class="post-media">
            <video src="${p.mediaUrl}" controls playsinline preload="metadata" poster="${p.thumbnailUrl || ''}"></video>
            <div class="cached-badge" id="cached-${p.id}">Cached</div>
          </div>
          <div class="post-actions">
            <button class="action-btn" onclick="likePost('${p.id}','${p.userId}')">❤️</button>
            <span class="action-count" id="likes-${p.id}">${p.likes || 0}</span>
            
            <button class="action-btn" onclick="commentPost('${p.id}','${p.userId}')">💬</button>
            <span class="action-count" id="comments-${p.id}">${p.comments || 0}</span>
          </div>
        </div>
      `;
    }).join('');
    
    // Check cache status
    if('caches' in window) {
      posts.forEach(p => {
        if(p.mediaUrl) {
          caches.match(p.mediaUrl).then(cached => {
            if(cached) {
              const badge = document.getElementById(`cached-${p.id}`);
              if(badge) badge.style.display = 'block';
            }
          });
        }
      });
    }
  } catch(e) {
    console.error(e);
    document.getElementById('feed').innerHTML = '<div style="text-align:center;padding:40px;color:red">Failed to load feed</div>';
  }
}

async function likePost(postId, creatorId) {
  if(!token) return alert('Login required');
  try {
    const response = await fetch(`${API}/api/like`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({postId, creatorId})
    });
    
    if(!response.ok) throw new Error('Server error handling like');
    
    const el = document.getElementById(`likes-${postId}`);
    if(el) el.textContent = parseInt(el.textContent || 0) + 1;
  } catch(err) {
    alert('Failed to register like. Try again.');
  }
}

async function commentPost(postId, creatorId) {
  if(!token) return alert('Login required');
  const text = prompt('Comment:');
  if(!text) return;
  
  try {
    const response = await fetch(`${API}/api/comment`, {
      method:'POST', 
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({postId, creatorId, text})
    });
    
    if(!response.ok) throw new Error('Server error saving comment');
    
    const el = document.getElementById(`comments-${postId}`);
    if(el) el.textContent = parseInt(el.textContent || 0) + 1;
  } catch(err) {
    alert('Failed to post comment. Try again.');
  }
}

// Register SW
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW register failed:', err));
}

loadFeed();
</script>
</body>
</html>
