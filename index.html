<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GolViral</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.7);--accent:#00ff88;--text:#fff;--muted:#888;--border:#1a1a1a;--nav:70px;--top:100px}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;height:100dvh;overflow:hidden}
header{height:var(--top);background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:900;color:var(--accent)}
.tabs{display:flex;gap:20px;padding:0 15px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{color:var(--muted);font-weight:700;cursor:pointer;padding-bottom:10px;position:relative;white-space:nowrap}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
main{height:calc(100dvh - var(--nav) - var(--top));overflow-y:auto;scroll-snap-type:y mandatory}
.bottom-nav{height:var(--nav);background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);cursor:pointer;font-size:12px}
.nav-btn.active{color:var(--accent)}
.fab{position:fixed;bottom:90px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);box-shadow:0 0 20px var(--accent);border:none;display:flex;justify-content:center;align-items:center;cursor:pointer;z-index:9}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin:12px;padding:16px}
.reel{height:calc(100dvh - var(--nav) - var(--top));scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:flex-end}
.reel video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.actions{position:absolute;right:10px;bottom:80px;display:flex;flex-direction:column;gap:20px}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:700;cursor:pointer}
svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;z-index:200}
.modal.active{display:block}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(30px);border-radius:20px 20px 0 0;padding:20px;max-height:70vh}
.reader{position:fixed;inset:0;background:var(--bg);transform:translateX(100%);transition:0.3s;z-index:300;padding:20px;overflow-y:auto}
.reader.active{transform:translateX(0)}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:12px;outline:none}
.btn{background:var(--accent);color:#000;border:none;padding:12px 20px;border-radius:12px;font-weight:800;cursor:pointer}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header>
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>GolViral</div>
    <svg onclick="openSearch()" viewBox="0 0 24 24" style="cursor:pointer"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="loadFeed('ForYou',this)">ForYou</div>
    <div class="tab" onclick="loadFeed('Reels',this)">Reels</div>
    <div class="tab" onclick="loadFeed('Novels',this)">Novels</div>
    <div class="tab" onclick="loadFeed('Stories',this)">Stories</div>
  </div>
</header>
<main id="feed"></main>
<button class="fab" onclick="location.href='post.html'"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
<nav class="bottom-nav">
  <div class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></div>
  <div class="nav-btn" onclick="openSearch()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Search</span></div>
  <div class="nav-btn" onclick="location.href='post.html'"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Post</span></div>
  <div class="nav-btn" onclick="location.href='messages.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>DM</span></div>
  <div class="nav-btn" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Me</span></div>
</nav>
<!-- COMMENT SHEET -->
<div id="comment-sheet" class="modal">
  <div class="sheet">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px"><b>Comments</b><span onclick="closeSheet()" style="cursor:pointer">✕</span></div>
    <div id="comment-list" style="overflow-y:auto;max-height:300px;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px"><input id="comment-input" class="input" placeholder="Add comment..."><button class="btn" onclick="sendComment()">Send</button></div>
  </div>
</div>
<!-- SEARCH MODAL -->
<div id="search-modal" class="modal">
  <div class="sheet">
    <input id="search-input" class="input" placeholder="Search users..." oninput="debounceSearch(this.value)">
    <div id="search-results" style="margin-top:12px"></div>
  </div>
</div>
<!-- READER TAB -->
<div id="reader-tab" class="reader">
  <svg onclick="closeReader()" viewBox="0 0 24 24" style="margin-bottom:20px;cursor:pointer"><path d="M15 18l-6-6 6-6"/></svg>
  <h2 id="reader-title"></h2>
  <p id="reader-content" style="line-height:1.8;margin-top:16px;white-space:pre-wrap"></p>
</div>
<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
const USER_ID=localStorage.userId;
if(!TOKEN) location.href='auth.html';
let feedData=[];
let currentPost=null;
let searchTimer=null;
function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
async function api(path,opt={}){ try{ const res=await fetch(API+path,{...opt,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...opt.headers}}); if(res.status===401) location.href='auth.html'; return res.json(); }catch{ toast('Network error'); return {} } }
async function getSignedUrl(key,shard){ const d=await api(`/api/media/sign?key=${key}&shard=${shard}`); return d.url; }
async function loadFeed(type,el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); feedData=await api('/api/feed'); let filtered=type==='ForYou'?feedData:feedData.filter(p=>p.type.toLowerCase()===type.toLowerCase()); renderFeed(filtered,type); }
function renderFeed(posts,type){ const container=document.getElementById('feed'); container.innerHTML=''; if(type==='Reels'){ container.style.overflowY='scroll'; posts.filter(p=>p.type==='reel').forEach(p=>container.appendChild(createReel(p))); setupReelObserver(); }else{ container.style.overflowY='auto'; posts.forEach(p=>container.appendChild(createCard(p))); } }
function createReel(p){ const div=document.createElement('div'); div.className='reel'; div.dataset.id=p.id; div.dataset.creator=p.userId; div.innerHTML=` <video muted loop playsinline data-key="${p.mediaUrl}" data-shard="${p.b2Shard}"></video> <div style="position:relative;padding:16px;background:linear-gradient(transparent,rgba(0,0,0,0.8))"> <b>@${p.userId}</b><p>${p.caption||''}</p> ${p.externalLink && p.isBoosted ? `<a href="${p.externalLink}" target="_blank" style="color:var(--accent)">🔗 Link</a>` : ''} </div> <div class="actions"> <div class="action-btn" onclick="likePost('${p.id}','${p.userId}')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>${p.likes||0}</span></div> <div class="action-btn" onclick="openComments('${p.id}','${p.userId}')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${p.comments||0}</span></div> <div class="action-btn" onclick="sendGift('${p.userId}')"><svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div> <div class="action-btn" onclick="boostPost('${p.id}')"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div> </div>`; return div; }
function createCard(p){ const div=document.createElement('div'); div.className='card'; div.innerHTML=`<b>${p.title||'Untitled'}</b><p style="color:var(--muted);margin:8px 0">${p.caption||''}</p><button class="btn" onclick="openReader('${p.id}')">Read</button>`; return div; }
function setupReelObserver(){ const obs=new IntersectionObserver(entries=>{ entries.forEach(e=>{ const video=e.target.querySelector('video'); const postId=e.target.dataset.id; const creatorId=e.target.dataset.creator; if(e.intersectionRatio>0.7){ if(!video.src){ getSignedUrl(video.dataset.key,video.dataset.shard).then(url=>{video.src=url;video.play()}); } else { video.play(); } api('/api/view',{method:'POST',body:JSON.stringify({postId,userId:creatorId,viewerId:USER_ID}) }else video.pause(); }) },{threshold:0.7}); document.querySelectorAll('.reel').forEach(r=>obs.observe(r)); }
async function likePost(postId,creatorId){ await api('/api/like',{method:'POST',body:JSON.stringify({postId,creatorId})}) }
async function sendGift(userId){ const res=await api('/api/gift/send',{method:'POST',body:JSON.stringify({receiverId:userId}) if(res.success) toast('Gift sent!') }
function boostPost(id){location.href=`post.html?boost=${id}`}
async function openComments(postId,creatorId){ currentPost={postId,creatorId}; document.getElementById('comment-sheet').classList.add('active'); const d=await api(`/api/comments/${postId}`); document.getElementById('comment-list').innerHTML=(d.comments||[]).map(c=>`<p style="margin-bottom:8px"><b>${c.user.username}</b>: ${c.text}</p>`).join(''); }
function closeSheet(){document.getElementById('comment-sheet').classList.remove('active')}
document.getElementById('comment-sheet').onclick = e => {if(e.target.id==='comment-sheet') closeSheet()}
document.getElementById('search-modal').onclick = e => {if(e.target.id==='search-modal') e.target.classList.remove('active')}
async function sendComment(){ const text=document.getElementById('comment-input').value; if(!text) return; await api('/api/comment',{method:'POST',body:JSON.stringify({...currentPost,text})}); document.getElementById('comment-input').value=''; openComments(currentPost.postId,currentPost.creatorId); }
async function openReader(id){ const p=await api(`/api/post/${id}`); document.getElementById('reader-title').innerText=p.title||'No Title'; document.getElementById('reader-content').innerText=p.content||'No Content'; document.getElementById('reader-tab').classList.add('active'); api('/api/read-session',{method:'POST',body:JSON.stringify({contentId:id,authorId:p.userId,contentType:p.type})}) }
function closeReader(){document.getElementById('reader-tab').classList.remove('active')}
function openSearch(){document.getElementById('search-modal').classList.add('active')}
function debounceSearch(q){clearTimeout(searchTimer);searchTimer=setTimeout(()=>searchUsers(q),300)}
async function searchUsers(q){ if(q.length<2)return; const users=await api(`/api/search/users?q=${q}`); document.getElementById('search-results').innerHTML=(users||[]).map(u=>`<div onclick="location.href='profile.html?id=${u.id}'" style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border)">${u.username} - ${u.followers} followers</div>`).join(''); }
loadFeed('ForYou',document.querySelector('.tab'));
if('serviceWorker' in navigator){navigator.serviceWorker.register('/golviral-frontend/sw.js').catch(()=>{})}
</script>
</body>
</html>
