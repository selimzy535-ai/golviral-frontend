<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GolViral</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#050505;--card:#0f0f0f;--glass:rgba(15,15,15,0.7);
  --accent:#00ff88;--purple:#a855f7;--pink:#ec4899;--blue:#3b82f6;--orange:#f97316;
  --text:#fff;--muted:#888;--border:#1f1f1f;--nav:70px;--top:100px;
  --gradient:linear-gradient(135deg,#00ff88,#3b82f6,#a855f7)
}
body.light{
  --bg:#f5f5f5;--card:#ffffff;--glass:rgba(255,255,255,0.8);
  --text:#111;--muted:#666;--border:#e0e0e0;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;height:100dvh;overflow:hidden}
header{height:var(--top);background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:20px;padding:0 15px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{color:var(--muted);font-weight:700;cursor:pointer;padding-bottom:10px;position:relative;white-space:nowrap}
.tab.active{color:#000;background:var(--gradient);padding:6px 12px;border-radius:20px}
main{height:calc(100dvh - var(--nav) - var(--top));overflow-y:auto;scroll-snap-type:y mandatory}
.bottom-nav{height:var(--nav);background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);cursor:pointer;font-size:12px}
.nav-btn.active{color:var(--accent)}
.fab{position:fixed;bottom:90px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--gradient);box-shadow:0 0 20px rgba(0,255,136,0.4);border:none;display:flex;justify-content:center;align-items:center;cursor:pointer;z-index:9}

/* SCROLL CARDS - NOW FULL SCREEN LIKE REELS */
.scroll-card{height:calc(100dvh - var(--nav) - var(--top));scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:flex-end;background:#000}
.scroll-card.bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(20px) brightness(0.4)}
.scroll-card.content{position:relative;padding:20px;z-index:2;background:linear-gradient(transparent,rgba(0,0,0,0.9))}
.scroll-card h2{font-size:22px;margin-bottom:8px}
.scroll-card p{color:var(--muted);font-size:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.reel{height:calc(100dvh - var(--nav) - var(--top));scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:flex-end}
.reel video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.actions{position:absolute;right:10px;bottom:80px;display:flex;flex-direction:column;gap:18px}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:700;cursor:pointer}
.reactions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.reaction{font-size:20px;cursor:pointer;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:20px;transition:0.2s}
.reaction:active{transform:scale(1.2)}
svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;z-index:200}
.modal.active{display:block}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(30px);border-radius:20px 20px 0 0;padding:20px;max-height:70vh;border:1px solid var(--border)}
.reader{position:fixed;inset:0;background:var(--bg);transform:translateX(100%);transition:0.3s;z-index:300;padding:20px;overflow-y:auto}
.reader.active{transform:translateX(0)}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:12px;outline:none}
.input:focus{border-color:var(--accent)}
.btn{background:var(--gradient);color:#000;border:none;padding:12px 20px;border-radius:12px;font-weight:800;cursor:pointer;width:100%}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<header>
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>GolViral</div>
    <div style="display:flex;gap:12px">
      <svg id="theme-toggle" onclick="toggleTheme()" viewBox="0 0 24 24" style="cursor:pointer"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg onclick="openSearch()" viewBox="0 0 24 24" style="cursor:pointer"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="loadFeed('ForYou',this)">ForYou</div>
    <div class="tab" onclick="loadFeed('Reels',this)">Reels</div>
    <div class="tab" onclick="loadFeed('Novels',this)">Short Story</div>
    <div class="tab" onclick="loadFeed('Stories',this)">Memes</div>
  </div>
</header>

<main id="feed"></main>

<button class="fab" onclick="location.href='post.html'"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>

<nav class="bottom-nav">
  <div class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></div>
  <div class="nav-btn" onclick="openSearch()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Search</span></div>
  <div class="nav-btn" onclick="location.href='post.html'"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Post</span></div>
  <div class="nav-btn" onclick="location.href='messages.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>DM</span></div>
  <div class="nav-btn" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Me</span></div>
</nav>

<!-- COMMENT SHEET -->
<div id="comment-sheet" class="modal">
  <div class="sheet">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px"><b>Comments</b><span onclick="closeSheet()" style="cursor:pointer">✕</span></div>
    <div id="comment-list" style="overflow-y:auto;max-height:300px;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px"><input id="comment-input" class="input" placeholder="Add comment..."><button class="btn" onclick="sendComment()">Send</button></div>
  </div>
</div>

<!-- SEARCH MODAL -->
<div id="search-modal" class="modal">
  <div class="sheet">
    <input id="search-input" class="input" placeholder="Search users..." oninput="debounceSearch(this.value)">
    <div id="search-results" style="margin-top:12px"></div>
  </div>
</div>

<!-- READER TAB -->
<div id="reader-tab" class="reader">
  <svg onclick="closeReader()" viewBox="0 0 24 24" style="margin-bottom:20px;cursor:pointer"><path d="M15 18l-6-6 6-6"/></svg>
  <h2 id="reader-title"></h2>
  <p id="reader-content" style="line-height:1.8;margin-top:16px;white-space:pre-wrap"></p>
</div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
const USER_ID=localStorage.userId;
if(!TOKEN) location.href='auth.html';

let feedData=[];
let currentPost=null;
let searchTimer=null;
let reactionCounts={};

// THEME TOGGLE
(function(){
  const saved = localStorage.getItem('golviral_theme');
  if(saved === 'light') document.body.classList.add('light');
  updateThemeIcon();
})();
function toggleTheme(){
  document.body.classList.toggle('light');
  const theme = document.body.classList.contains('light')? 'light' : 'dark';
  localStorage.setItem('golviral_theme', theme);
  updateThemeIcon();
}
function updateThemeIcon(){
  const icon = document.getElementById('theme-toggle');
  if(!icon) return;
  const isLight = document.body.classList.contains('light');
  icon.innerHTML = isLight
   ? `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`
    : `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
}

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

async function api(path,opt={}){
  try{
    const res=await fetch(API+path,{...opt,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...opt.headers}});
    if(res.status===401) location.href='auth.html';
    return res.json();
  }catch{ toast('Network error'); return {} }
}

async function getSignedUrl(key,shard){
  const d=await api(`/api/media/sign?key=${key}&shard=${shard}`);
  return d.url;
}

async function loadFeed(type,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  feedData=await api('/api/feed');

  const typeMap = {ForYou:'all', Reels:'reel', Novels:'novel', Stories:'story'};
  const targetType = typeMap[type];
  let filtered = targetType==='all'? feedData : feedData.filter(p=>p.type===targetType);
  renderFeed(filtered,type);
}

function renderFeed(posts,type){
  const container=document.getElementById('feed');
  container.innerHTML='';
  if(!posts || posts.length===0){container.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">No posts yet</p>'; return}

  container.style.overflowY='scroll';
  if(type==='Reels'){
    posts.filter(p=>p.type==='reel').forEach(p=>container.appendChild(createReel(p)));
  }else if(type==='Novels'){
    posts.filter(p=>p.type==='novel').forEach(p=>container.appendChild(createScrollCard(p,'story')));
  }else if(type==='Stories'){
    posts.filter(p=>p.type==='story').forEach(p=>container.appendChild(createScrollCard(p,'meme')));
  }else{
    posts.filter(p=>p.type==='reel').forEach(p=>container.appendChild(createReel(p)));
    posts.filter(p=>p.type!=='reel').forEach(p=>container.appendChild(createScrollCard(p,p.type)));
  }
  setupScrollObserver();
}

function createReel(p){
  const div=document.createElement('div');
  div.className='reel';
  div.dataset.id=p.id;
  div.dataset.creator=p.userId;
  div.innerHTML=`
    <video muted loop playsinline data-key="${p.mediaUrl}" data-shard="${p.b2Shard}"></video>
    <div style="position:relative;padding:16px;background:linear-gradient(transparent,rgba(0,0,0,0.8))">
      <b>@${p.userId}</b><p>${p.caption||''}</p>
      ${p.externalLink && p.isBoosted? `<a href="${p.externalLink}" target="_blank" style="color:var(--accent)">🔗 Link</a>` : ''}
    </div>
    <div class="actions">
      <div class="action-btn" onclick="likePost('${p.id}','${p.userId}')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>${p.likes||0}</span></div>
      <div class="action-btn" onclick="openComments('${p.id}','${p.userId}')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${p.comments||0}</span></div>
      <div class="action-btn" onclick="sendGift('${p.userId}')"><svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div>
      <div class="action-btn" onclick="boostPost('${p.id}')"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
    </div>`;
  return div;
}

function createScrollCard(p,type){
  const div=document.createElement('div');
  div.className='scroll-card';
  div.dataset.id=p.id;
  let lastTap=0;
  div.ondblclick=()=>openReader(p.id); // double tap to open

  div.innerHTML=`
    <div class="bg" style="background-image:url(${p.cover||'https://picsum.photos/500/900'})"></div>
    <div class="content">
      <b>@${p.userId}</b>
      <h2>${p.title||'Untitled'}</h2>
      <p>${p.content?.slice(0,150)||p.caption||''}</p>
      <div class="reactions">${renderReactions(p.id)}</div>
      <p style="margin-top:8px;font-size:12px;color:var(--accent)">Double tap to read full</p>
    </div>`;
  return div;
}

function renderReactions(postId){
  const emojis=['❤️','😡','🤷‍♂️','💵','🙏','😛'];
  reactionCounts[postId]=reactionCounts[postId]||{};
  return emojis.map(e=>`<span class="reaction" onclick="addReaction('${postId}','${e}')">${e} ${reactionCounts[postId][e]||0}</span>`).join('');
}

function addReaction(postId,emoji){
  reactionCounts[postId][emoji]=(reactionCounts[postId][emoji]||0)+1;
  document.querySelectorAll(`[data-id="${postId}"].reactions`).forEach(el=>el.innerHTML=renderReactions(postId));
}

function setupScrollObserver(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const video=e.target.querySelector('video');
      const postId=e.target.dataset.id;
      const creatorId=e.target.dataset.creator;
      if(e.intersectionRatio>0.7){
        if(video){
          if(!video.src){
            getSignedUrl(video.dataset.key,video.dataset.shard).then(url=>{video.src=url;video.play()});
          } else { video.play(); }
        }
        api('/api/view',{method:'POST',body:JSON.stringify({postId,userId:creatorId,viewerId:USER_ID})});
      }else{
        if(video) video.pause();
      }
    });
  },{threshold:0.7});
  document.querySelectorAll('.reel,.scroll-card').forEach(r=>obs.observe(r));
}

async function likePost(postId,creatorId){
  await api('/api/like',{method:'POST',body:JSON.stringify({postId,creatorId})});
}

async function sendGift(userId){
  const res=await api('/api/gift/send',{method:'POST',body:JSON.stringify({receiverId:userId})});
  if(res.success) toast('Gift sent!');
}

function boostPost(id){location.href=`post.html?boost=${id}`}

async function openComments(postId,creatorId){
  currentPost={postId,creatorId};
  document.getElementById('comment-sheet').classList.add('active');
  const d=await api(`/api/comments/${postId}`);
  document.getElementById('comment-list').innerHTML=(d.comments||[]).map(c=>`<p style="margin-bottom:8px"><b>${c.user.username}</b>: ${c.text}</p>`).join('');
}

function closeSheet(){document.getElementById('comment-sheet').classList.remove('active')}

document.getElementById('comment-sheet').onclick = e => {if(e.target.id==='comment-sheet') closeSheet()}
document.getElementById('search-modal').onclick = e => {if(e.target.id==='search-modal') e.target.classList.remove('active')}

async function sendComment(){
  const text=document.getElementById('comment-input').value;
  if(!text) return;
  await api('/api/comment',{method:'POST',body:JSON.stringify({...currentPost,text})});
  document.getElementById('comment-input').value='';
  openComments(currentPost.postId,currentPost.creatorId);
}

async function openReader(id){
  const p=await api(`/api/post/${id}`);
  document.getElementById('reader-title').innerText=p.title||'No Title';
  document.getElementById('reader-content').innerText=p.content||'No Content';
  document.getElementById('reader-tab').classList.add('active');
  api('/api/read-session',{method:'POST',body:JSON.stringify({contentId:id,authorId:p.userId,contentType:p.type})});
}

function closeReader(){document.getElementById('reader-tab').classList.remove('active')}

function openSearch(){document.getElementById('search-modal').classList.add('active')}

function debounceSearch(q){clearTimeout(searchTimer);searchTimer=setTimeout(()=>searchUsers(q),300)}

async function searchUsers(q){
  if(q.length<2) return;
  const users=await api(`/api/search/users?q=${q}`);
  document.getElementById('search-results').innerHTML=(users||[]).map(u=>`<div onclick="location.href='profile.html?id=${u.id}'" style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border)">${u.username} - ${u.followers} followers</div>`).join('');
}

loadFeed('ForYou',document.querySelector('.tab'));

if('serviceWorker' in navigator){navigator.serviceWorker.register('/golviral-frontend/sw.js').catch(()=>{})}
</script>
</body>
</html>
