<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GolViral</title>
  
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW sync failed:', err));
    }
  </script>

  <style>
    :root {
      --bg: #000;
      --surface: #181818;
      --accent: #00ff88;
      --text: #ffffff;
      --text-muted: #888888;
      --top-nav-height: 100px;
      --bottom-nav-height: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 0 auto;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--top-nav-height);
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--surface);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
    }

    .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); }
    .search-icon { font-size: 1.2rem; cursor: pointer; }

    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 15px 10px;
      gap: 20px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--accent); }

    main {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      position: relative;
    }
    main::-webkit-scrollbar { display: none; }
    
    main.reels-mode { scroll-snap-type: y mandatory; }
    .reel-container {
      height: calc(100dvh - var(--top-nav-height) - var(--bottom-nav-height));
      scroll-snap-align: start;
      position: relative;
      background: var(--surface);
    }
    .reel-video { width: 100%; height: 100%; object-fit: cover; }
    .reel-actions {
      position: absolute;
      right: 15px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .action-btn {
      background: rgba(0,0,0,0.5);
      border: none;
      color: var(--text);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .feed-card {
      background: var(--surface);
      border-radius: 12px;
      margin: 15px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-cover { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #333; }
    .card-title { font-size: 1.1rem; font-weight: bold; }
    .card-caption { font-size: 0.9rem; color: var(--text-muted); }
    .btn-read {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .bottom-nav {
      height: var(--bottom-nav-height);
      background: var(--bg);
      border-top: 1px solid var(--surface);
      display: flex;
      justify-content: space-around;
      align-items: center;
      position: sticky;
      bottom: 0;
      z-index: 100;
    }
    .nav-item { color: var(--text-muted); font-size: 1.5rem; cursor: pointer; text-decoration: none; }
    .nav-item.active { color: var(--text); }

    .floating-add {
      position: fixed;
      bottom: calc(var(--bottom-nav-height) + 20px);
      right: 20px;
      background: var(--accent);
      color: #000;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,255,136,0.3);
      cursor: pointer;
      z-index: 90;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 200;
      flex-direction: column;
    }
    .modal-header { padding: 15px; border-bottom: 1px solid var(--surface); display: flex; justify-content: space-between; }
    .close-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
    
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid #333;
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      margin: 15px;
      width: calc(100% - 30px);
      outline: none;
    }
    .search-results { padding: 0 15px; flex: 1; overflow-y: auto; }
    .user-row { padding: 10px 0; border-bottom: 1px solid var(--surface); cursor: pointer; }

    .bottom-sheet {
      position: fixed;
      bottom: -100%;
      left: 0; right: 0;
      max-width: 500px;
      margin: 0 auto;
      height: 70vh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 300;
      transition: bottom 0.3s;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open { bottom: 0; }
    .sheet-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
    .comment-list { flex: 1; overflow-y: auto; padding: 15px; }
    .comment-input-area { padding: 15px; display: flex; gap: 10px; background: var(--surface); }
    .comment-input { flex: 1; background: var(--bg); border: none; color: var(--text); padding: 10px; border-radius: 20px; outline: none; }
    .send-btn { color: var(--accent); background: none; border: none; font-weight: bold; cursor: pointer; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 299; }
    .overlay.open { display: block; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <header>
    <div class="top-bar">
      <div class="logo">GolViral</div>
      <div class="search-icon" onclick="openSearch()">🔍</div>
    </div>
    <div class="tabs" id="tabs-container">
      <div class="tab active" onclick="switchTab('ForYou', event)">ForYou</div>
      <div class="tab" onclick="switchTab('Reels', event)">Reels</div>
      <div class="tab" onclick="switchTab('Novels', event)">Novels</div>
      <div class="tab" onclick="switchTab('Stories', event)">Stories</div>
    </div>
  </header>

  <main id="feed-container"></main>

  <button class="floating-add" onclick="location.href='post.html'">+</button>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">🏠</a>
    <a href="#" class="nav-item" onclick="openSearch()">🔍</a>
    <a href="post.html" class="nav-item">➕</a>
    <a href="messages.html" class="nav-item">💬</a>
    <a href="profile.html" class="nav-item">👤</a>
  </nav>

  <div id="search-modal" class="modal">
    <div class="modal-header">
      <h3>Search</h3>
      <button class="close-btn" onclick="closeSearch()">✕</button>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="Search users...">
    <div class="search-results" id="search-results"></div>
  </div>

  <div id="overlay" class="overlay" onclick="closeComments()"></div>
  <div id="comment-sheet" class="bottom-sheet">
    <div class="sheet-header">Comments</div>
    <div class="comment-list" id="comment-list"></div>
    <div class="comment-input-area">
      <input type="text" id="comment-input" class="comment-input" placeholder="Add a comment...">
      <button class="send-btn" onclick="postComment()">Send</button>
    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('token');
    if (!TOKEN) window.location.href = 'auth.html';
    
    const API_BASE = 'https://golviral-api.onrender.com';
    let currentFeed = [];
    let activePostIdForComment = null;
    let activeCreatorIdForComment = null;

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 3000);
    }

    async function fetchAPI(endpoint, options = {}) {
      try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          ...options,
          headers: {
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json',
            ...(options.headers || {})
          }
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'auth.html';
          return null;
        }
        
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      } catch (err) {
        showToast(err.message || 'Network Error');
        return null;
      }
    }

    async function getSignedVideoUrl(key, shard) {
      const data = await fetchAPI(`/api/media/sign?key=${key}&shard=${shard}`);
      return data?.url || '';
    }

    async function loadFeed() {
      const data = await fetchAPI('/api/feed');
      if (data) {
        currentFeed = data;
        renderFeed('ForYou', event);
      }
    }

    function switchTab(type, e) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      renderFeed(type, e);
    }

    async function renderFeed(type) {
      const container = document.getElementById('feed-container');
      container.innerHTML = '';
      
      let filtered = type === 'ForYou' ? currentFeed : currentFeed.filter(item => item.type.toLowerCase() === type.toLowerCase());
      
      if (type === 'Reels') {
        container.classList.add('reels-mode');
        for (const post of filtered) {
          container.appendChild(await createReelElement(post));
        }
        setupReelsObserver();
      } else {
        container.classList.remove('reels-mode');
        filtered.forEach(post => container.appendChild(createCardElement(post)));
      }
    }

    async function createReelElement(post) {
      const div = document.createElement('div');
      div.className = 'reel-container';
      
      let videoSrc = await getSignedVideoUrl(post.mediaUrl, post.b2Shard);

      div.innerHTML = `
        <video class="reel-video" data-id="${post.id}" data-creator="${post.userId}" loop playsinline src="${videoSrc}"></video>
        <div class="reel-actions">
          <button class="action-btn" onclick="likePost('${post.id}', '${post.userId}')">❤️</button>
          <button class="action-btn" onclick="openComments('${post.id}', '${post.userId}')">💬</button>
          <button class="action-btn" onclick="sendGiftModal('${post.userId}')">🎁</button>
          <button class="action-btn" onclick="sharePost('${post.id}')">↗️</button>
          <button class="action-btn" onclick="boostPost('${post.id}')">🚀</button>
        </div>
      `;
      return div;
    }

    function createCardElement(post) {
      const div = document.createElement('div');
      div.className = 'feed-card';
      div.innerHTML = `
        <div class="card-title">${post.title || 'Untitled ' + post.type}</div>
        <div class="card-caption">${post.caption || ''}</div>
        <button class="btn-read" onclick='readSession(${JSON.stringify(post)})'>Read</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="action-btn" style="width:35px; height:35px;" onclick="likePost('${post.id}', '${post.userId}')">❤️</button>
          <button class="action-btn" style="width:35px; height:35px;" onclick="openComments('${post.id}', '${post.userId}')">💬</button>
        </div>
      `;
      return div;
    }

    let reelsObserver = null;
    function setupReelsObserver() {
      if (reelsObserver) reelsObserver.disconnect();
      
      reelsObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          if (entry.intersectionRatio >= 0.7) {
            video.play().catch(e => console.log('Autoplay blocked', e));
            fetchAPI('/api/view', {
              method: 'POST',
              body: JSON.stringify({ postId: video.dataset.id, userId: video.dataset.creator })
            });
          } else {
            video.pause();
          }
        });
      }, { threshold: 0.7 });

      document.querySelectorAll('.reel-video').forEach(vid => reelsObserver.observe(vid));
    }

    async function likePost(postId, creatorId) {
      const res = await fetchAPI('/api/like', { method: 'POST', body: JSON.stringify({ postId, creatorId }) });
      if (res) showToast('Liked!');
    }

    async function readSession(post) {
      await fetchAPI('/api/read-session', { 
        method: 'POST', 
        body: JSON.stringify({ contentId: post.id, authorId: post.userId, contentType: post.type }) 
      });
      showToast('Reading session started +10pts');
    }

    function sendGiftModal(userId) {
      localStorage.setItem('giftTo', userId);
      location.href = 'profile.html#gifts';
    }

    function sharePost(id) { 
      navigator.clipboard.writeText(`${APP_BASE_URL}/post/${id}`);
      showToast('Link Copied!'); 
    }

    function boostPost(id) { 
      location.href = `post.html?boost=${id}` 
    }

    async function openComments(postId, creatorId) {
      activePostIdForComment = postId;
      activeCreatorIdForComment = creatorId;
      document.getElementById('comment-sheet').classList.add('open');
      document.getElementById('overlay').classList.add('open');
      
      const list = document.getElementById('comment-list');
      list.innerHTML = 'Loading...';
      
      const data = await fetchAPI(`/api/comments/${postId}`);
      list.innerHTML = '';
      if(data && data.comments.length) {
        data.comments.forEach(c => {
          list.innerHTML += `<div style="margin-bottom:10px;"><b>${c.user.username}</b>: ${c.text}</div>`;
        });
      } else {
        list.innerHTML = '<div style="color:var(--text-muted)">No comments yet.</div>';
      }
    }

    function closeComments() {
      document.getElementById('comment-sheet').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      activePostIdForComment = null;
      activeCreatorIdForComment = null;
    }

    async function postComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if(!text || !activePostIdForComment) return;
      
      const res = await fetchAPI('/api/comment', {
        method: 'POST',
        body: JSON.stringify({ postId: activePostIdForComment, creatorId: activeCreatorIdForComment, text })
      });
      
      if(res) {
        input.value = '';
        openComments(activePostIdForComment, activeCreatorIdForComment);
      }
    }

    function openSearch() { document.getElementById('search-modal').style.display = 'flex'; }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value.trim();
      const resultsDiv = document.getElementById('search-results');
      
      if(!q) { resultsDiv.innerHTML = ''; return; }
      
      searchTimeout = setTimeout(async () => {
        const users = await fetchAPI(`/api/search/users?q=${encodeURIComponent(q)}`);
        if(users) {
          resultsDiv.innerHTML = users.map(u => `<div class="user-row" onclick="location.href='profile.html?id=${u.id}'">${u.username} ${u.isVerified ? '✓' : ''}</div>`).join('');
        }
      }, 300);
    });

    window.onload = loadFeed;
  </script>
</body>
</html>
