<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Post</title>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#FFFFFF;color:#000;min-height:100vh;padding-bottom:70px}
header{position:sticky;top:0;background:#FFFFFF;border-bottom:1px solid #E0E0E0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.tabs{display:flex;border-bottom:2px solid #F0F0F0}
.tab{flex:1;padding:14px;text-align:center;font-weight:600;color:#8E8E8E;cursor:pointer}
.tab.active{color:#FF0050;border-bottom:2px solid #FF0050}
.content{padding:20px;max-width:600px;margin:0 auto}
.warning{background:#FFF3CD;border:1px solid #FFE69C;color:#856404;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px}
input,textarea,select{width:100%;padding:14px;border:1px solid #DDD;border-radius:8px;margin-bottom:12px;font-size:16px}
textarea{resize:none;height:80px}
button{width:100%;padding:14px;background:#FF0050;color:#FFF;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer}
button:disabled{background:#CCC}
.preview{width:100%;aspect-ratio:9/16;background:#000;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:#666;overflow:hidden}
progress{width:100%;height:6px;margin-bottom:12px}
.error{color:#FF3B30;font-size:13px;margin-bottom:8px;display:none}
nav{position:fixed;bottom:0;left:0;right:0;background:#FFFFFF;border-top:1px solid #E0E0E0;display:flex;justify-content:space-around;padding:8px 0}
nav a{text-decoration:none;color:#8E8E8E;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px}
nav a.active{color:#FF0050}
</style>
</head>
<body>
<header>
  <h2>Create Post</h2>
  <div style="font-size:13px;color:#666">Fee: 25 Credits</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab(event, 'upload')">Upload</div>
  <div class="tab" onclick="showTab(event, 'camera')">Camera</div>
</div>

<div class="content">
  <div class="warning">
    ⚠️ 25 Free Credits will be deducted. Max 30s, 480p, 1.5MB. 3 posts/day limit.
    Refunded instantly if video fails API check.
  </div>

  <div id="upload-tab">
    <input type="file" id="file-input" accept="video/*,image/*" onchange="handleFile(this.files[0])">
    <div class="preview" id="preview">Select video or image</div>
    <textarea id="caption" placeholder="Write a caption..."></textarea>
    <select id="type">
      <option value="REEL">Reel Video</option>
      <option value="IMAGE">Image</option>
      <option value="STORY">Short Story</option>
      <option value="NOVEL">Novel Chapter</option>
    </select>
    <progress id="progress" value="0" max="100" style="display:none"></progress>
    <div class="error" id="error"></div>
    <button id="post-btn" onclick="createPost()" disabled>Post - Deduct 25 Credits</button>
  </div>

  <div id="camera-tab" style="display:none">
    <video id="camera" autoplay playsinline style="width:100%;aspect-ratio:9/16;background:#000;border-radius:12px"></video>
    <button id="record-btn" onclick="toggleRecord()">Start Recording</button>
  </div>
</div>

<nav>
  <a href="/index.html">🏠<span>Feed</span></a>
  <a href="/explore.html">🔍<span>Explore</span></a>
  <a href="/post.html" class="active">➕<span>Post</span></a>
  <a href="/wallet.html">💰<span>Wallet</span></a>
  <a href="/profile.html">👤<span>Profile</span></a>
</nav>

<script>
const API = 'https://golviral-api.onrender.com';
const token = localStorage.getItem('token');
let selectedFile = null;
let compressedBlob = null;
let mediaRecorder = null;
let recordedChunks = [];
let activeCameraStream = null;

function showTab(e, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
  
  document.getElementById('upload-tab').style.display = tab === 'upload' ? 'block' : 'none';
  document.getElementById('camera-tab').style.display = tab === 'camera' ? 'block' : 'none';
  
  if (tab === 'camera') {
    startCamera();
  } else {
    stopCamera();
  }
}

async function handleFile(file) {
  if (!file) return;
  const error = document.getElementById('error');
  error.style.display = 'none';

  if (file.type.startsWith('image/')) {
    selectedFile = file;
    compressedBlob = null; // reset video track pointer
    document.getElementById('preview').innerHTML = `<img src="${URL.createObjectURL(file)}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    document.getElementById('post-btn').disabled = false;
    return;
  }

  // Video Process Logic
  document.getElementById('preview').textContent = 'Compressing to 480p 30s...';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('post-btn').disabled = true;

  try {
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    
    await ffmpeg.load();
    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

    await ffmpeg.run(
      '-i', 'input.mp4',
      '-t', '30',
      '-vf', 'scale=480:-2',
      '-b:v', '0.8M',
      '-b:a', '64k',
      '-fs', '1.5M',
      '-preset', 'ultrafast',
      'output.mp4'
    );

    const data = ffmpeg.FS('readFile', 'output.mp4');
    compressedBlob = new Blob([data.buffer], {type:'video/mp4'});

    if (compressedBlob.size > 1.5 * 1024 * 1024) {
      throw new Error('Video still >1.5MB after compression bounds check');
    }

    document.getElementById('preview').innerHTML =
      `<video src="${URL.createObjectURL(compressedBlob)}" controls style="width:100%;height:100%;border-radius:12px"></video>`;
    document.getElementById('post-btn').disabled = false;

  } catch(e) {
    error.textContent = 'Compression failed: ' + e.message;
    error.style.display = 'block';
  } finally {
    document.getElementById('progress').style.display = 'none';
  }
}

async function startCamera() {
  try {
    activeCameraStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    document.getElementById('camera').srcObject = activeCameraStream;
  } catch(err) {
    alert('Could not access camera or microphone devices.');
  }
}

function stopCamera() {
  if (activeCameraStream) {
    activeCameraStream.getTracks().forEach(track => track.stop());
    activeCameraStream = null;
  }
}

function toggleRecord() {
  const btn = document.getElementById('record-btn');
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    recordedChunks = [];
    const stream = document.getElementById('camera').srcObject;
    if (!stream) return alert('No camera preview available');
    
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, {type:'video/mp4'});
      handleFile(new File([blob], 'recording.mp4', {type: 'video/mp4'}));
    };
    mediaRecorder.start();
    btn.textContent = 'Stop Recording';
    setTimeout(() => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
  } else {
    mediaRecorder.stop();
    btn.textContent = 'Start Recording';
  }
}

async function createPost() {
  const btn = document.getElementById('post-btn');
  const error = document.getElementById('error');
  btn.disabled = true;
  error.style.display = 'none';

  const file = compressedBlob || selectedFile;
  const caption = document.getElementById('caption').value;
  const type = document.getElementById('type').value;

  if (!file) {
    btn.disabled = false;
    return;
  }

  try {
    const res = await fetch(`${API}/api/post/create-intent`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({type, caption, fileSize:file.size, duration:30})
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to initialize creation pipeline');

    // Safe, raw cross-origin binary stream upload directly to Backblaze B2
    const b2Upload = await fetch(data.uploadUrl, {
      method:'PUT',
      body:file
    });

    if (!b2Upload.ok) throw new Error('Failed to push media stream storage blocks to B2 destination');

    alert('Post uploaded successfully!');
    window.location = '/index.html';

  } catch(e) {
    error.textContent = e.message;
    error.style.display = 'block';
    btn.disabled = false;
  }
}

if (!token) window.location = '/auth.html';
</script>
<script src="/a2hs.js"></script>
</body>
</html>
