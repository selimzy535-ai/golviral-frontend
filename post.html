<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Create</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#0a0a0a;--glass:rgba(10,10,10,0.7);--accent:#00ff88;--text:#fff;--muted:#888;--border:#1a1a1a}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.stepper{display:flex;gap:10px;margin-bottom:20px}
.step{flex:1;text-align:center;padding:8px;border-radius:12px;background:var(--card);color:var(--muted);font-size:12px}
.step.active{background:var(--accent);color:#000}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.type{padding:20px;text-align:center;border:1px solid var(--border);border-radius:12px;cursor:pointer}
.type.active{border-color:var(--accent);background:rgba(0,255,136,0.1)}
.input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;margin-bottom:12px;outline:none}
.drop{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;margin-bottom:12px;cursor:pointer}
.progress{height:6px;background:var(--card);border-radius:10px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:0.3s}
.btn{background:linear-gradient(90deg,var(--accent),#00cc6a);color:#000;border:none;padding:14px;border-radius:12px;font-weight:900;width:100%;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:8px}
.boost-grid{display:grid;gap:12px}
.boost-card{padding:20px;text-align:center;cursor:pointer}
.boost-card.active{border-color:var(--accent)}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<header>
<svg onclick="history.back()" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
<h2 id="page-title">Create Post</h2>
</header>

<div id="toast" class="toast"></div>

<div id="upload-screen">
<div class="stepper"><div class="step active" id="step-1">1. Type</div><div class="step" id="step-2">2. Upload</div><div class="step" id="step-3">3. Details</div></div>
<div class="card">
<h3 style="margin-bottom:12px">Choose Post Type</h3>
<div class="types">
<div class="type active" onclick="selectType('reel',this)"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><p>Reel</p><small>25 Credits</small></div>
<div class="type" onclick="selectType('novel',this)"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><p>Novel</p><small>10 Credits</small></div>
<div class="type" onclick="selectType('story',this)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><p>Story</p><small>10 Credits</small></div>
</div>
</div>

<div id="upload-step" class="card">
<h3>Upload File</h3>
<div class="drop" id="drop">
<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
<p>Drag .mp4 or .mov here or click</p>
<input type="file" id="file-input" accept="video/mp4,video/quicktime,video/mov" style="display:none">
</div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
</div>

<div id="details-step" style="display:none" class="card">
<h3>Post Details</h3>
<input class="input" id="title" placeholder="Title">
<textarea class="input" id="caption" placeholder="Caption"></textarea>
<input class="input" id="externalLink" placeholder="External Link (Optional)">
<textarea class="input" id="content" placeholder="Novel/Story Content" style="display:none;height:200px"></textarea>
<button class="btn" onclick="submitPost()">Publish Post</button>
</div>
</div>

<div id="boost-screen" style="display:none">
<h3 style="margin-bottom:16px">Boost This Post</h3>
<div class="boost-grid">
<div class="boost-card card active" onclick="selectBoost(3500,this)"><h2>₦3,500</h2><p>1 Day Boost</p></div>
<div class="boost-card card" onclick="selectBoost(7500,this)"><h2>₦7,500</h2><p>3 Days Boost</p></div>
<div class="boost-card card" onclick="selectBoost(17000,this)"><h2>₦17,000</h2><p>7 Days Boost</p></div>
</div>
<button class="btn" onclick="initBoost()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Boost Now</button>
</div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
if(!TOKEN) location.href='auth.html';

const params=new URLSearchParams(location.search);
const boostId=params.get('boost');
let selectedType='reel'; let selectedFile=null; let selectedBoost=3500;

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

if(boostId){
document.getElementById('upload-screen').style.display='none';
document.getElementById('boost-screen').style.display='block';
document.getElementById('page-title').innerText='Boost Post';
}else{
document.getElementById('upload-screen').style.display='block';
}

function selectType(t,el){
selectedType=t;
document.querySelectorAll('.type').forEach(x=>x.classList.remove('active'));
el.classList.add('active');

const isTextPost = t==='novel' || t==='story';
document.getElementById('upload-step').style.display = isTextPost ? 'none' : 'block';
document.getElementById('details-step').style.display = isTextPost ? 'block' : (selectedFile ? 'block' : 'none');
document.getElementById('content').style.display = isTextPost ? 'block' : 'none';

document.getElementById('step-2').classList.toggle('active', !isTextPost);
document.getElementById('step-3').classList.toggle('active', isTextPost);
}

document.getElementById('drop').onclick=()=>document.getElementById('file-input').click();
document.getElementById('file-input').onchange=e=>{selectedFile=e.target.files[0];handleFile(selectedFile)}
document.getElementById('drop').ondrop=e=>{e.preventDefault();selectedFile=e.dataTransfer.files[0];handleFile(selectedFile)}
document.getElementById('drop').ondragover=e=>e.preventDefault();

function handleFile(file){
if(!file) return;
if(file.size>50*1024*1024)return toast('Max 50MB');
document.getElementById('details-step').style.display='block';
document.getElementById('step-3').classList.add('active');
}

function selectBoost(amount,el){selectedBoost=amount;document.querySelectorAll('.boost-card').forEach(x=>x.classList.remove('active'));el.classList.add('active')}

async function submitPost(){
if(selectedType==='reel' && !selectedFile) return toast('Please select a video file');

const fileExt=selectedFile ? selectedFile.name.split('.').pop() : '';
const contentType=selectedFile ? selectedFile.type : '';
const title=document.getElementById('title').value;
const caption=document.getElementById('caption').value;
const content=document.getElementById('content').value;
const externalLink=document.getElementById('externalLink').value;

try {
const res1=await fetch(API+'/api/post/create-intent',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({fileExtension:fileExt,contentType,postType:selectedType,caption,externalLink})});
const d1=await res1.json(); if(d1.error)return toast(d1.error);

if(selectedFile && d1.uploadUrl){
await uploadFile(d1.uploadUrl,selectedFile);
}

const res3=await fetch(API+'/api/post/create',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({postId:d1.postId,objectKey:d1.objectKey,title,content})});
const d3=await res3.json();
toast(d3.message||'Post published!'); setTimeout(()=>location.href='index.html',1500);
} catch(err) {
toast('Failed to publish post');
}
}

async function uploadFile(url,file){
return new Promise((resolve,reject)=>{
const xhr=new XMLHttpRequest();
xhr.upload.onprogress=e=>{if(e.lengthComputable) document.getElementById('progress').style.width=(e.loaded/e.total*100)+'%'}
xhr.onload=()=>{
if(xhr.status>=200 && xhr.status<300) resolve();
else reject(new Error('Upload failed'));
};
xhr.onerror=()=>reject(new Error('Network error'));
xhr.open('PUT',url);
xhr.send(file);
});
}

async function initBoost(){
try {
const res=await fetch(API+'/api/boost/init',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({postId:boostId,tierAmount:selectedBoost})});
const data=await res.json();
if(data.selarLink) window.open(data.selarLink,'_blank');
else toast(data.error||'Failed to init boost');
} catch(err) {
toast('Boost initialization failed');
}
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
