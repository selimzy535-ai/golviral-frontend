<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolViral - Create</title>
<style>
:root{--bg:#050505;--card:#0f0f0f;--accent:#00ff88;--text:#fff;--muted:#888;--border:#1f1f1f;--gradient:linear-gradient(135deg,#00ff88,#3b82f6)}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.input{width:100%;background:#000;border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;margin-bottom:12px}
.drop{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;margin-bottom:12px}
.progress{height:6px;background:var(--card);border-radius:10px;overflow:hidden;margin-top:12px}
.progress-bar{height:100%;background:var(--gradient);width:0%}
.btn{background:var(--gradient);color:#000;border:none;padding:14px;border-radius:12px;font-weight:900;width:100%}
.btn:disabled{opacity:0.6}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-100px);background:var(--accent);color:#000;padding:12px 20px;border-radius:20px;font-weight:800;z-index:999;transition:0.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<h2>Create Post</h2>

<div class="card">
<div class="drop" id="drop">Tap to select video<input type="file" id="file-input" accept="video/mp4,video/quicktime,video/mov" style="display:none"></div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
</div>

<div class="card" id="details-step" style="display:none">
<input class="input" id="title" placeholder="Title">
<textarea class="input" id="caption" placeholder="Caption"></textarea>
<button class="btn" id="publish-btn" onclick="submitPost()">Publish Post</button>
</div>

<script>
const API='https://golviral-api.onrender.com';
const TOKEN=localStorage.token;
if(!TOKEN) location.href='auth.html';
let selectedFile=null;

function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}

document.getElementById('drop').onclick=()=>document.getElementById('file-input').click();
document.getElementById('file-input').onchange=e=>{selectedFile=e.target.files[0]; if(selectedFile){document.getElementById('details-step').style.display='block'; toast('File selected: '+selectedFile.name)}}

async function submitPost(){
const btn = document.getElementById('publish-btn');
btn.disabled=true; btn.innerText='Step 1: Getting Upload URL...';
toast('Step 1: Calling /create-intent');

const fileExt=selectedFile.name.split('.').pop();
const contentType=selectedFile.type;
const title=document.getElementById('title').value;
const caption=document.getElementById('caption').value;

try {
  // STEP 1: INTENT
  const res1=await fetch(API+'/api/post/create-intent',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({fileExtension:fileExt,contentType,postType:'reel',caption})});
  const d1=await res1.json();
  toast('Step 1 Result: '+res1.status+' '+ (d1.error||'OK'));
  if(!res1.ok) throw new Error('Intent failed: '+d1.error);
  btn.innerText='Step 2: Uploading to B2...';
  toast('Step 2: Uploading '+selectedFile.size+' bytes to B2');

  // STEP 2: UPLOAD TO B2
  await uploadFile(d1.uploadUrl,selectedFile);
  toast('Step 2 Success: Uploaded to B2');
  btn.innerText='Step 3: Activating Post...';

  // STEP 3: ACTIVATE
  const res3=await fetch(API+'/api/post/create',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({postId:d1.postId,objectKey:d1.objectKey,title})});
  const d3=await res3.json();
  toast('Step 3 Result: '+res3.status+' '+ (d3.message||d3.error));
  if(!res3.ok) throw new Error('Create failed: '+d3.error);

  toast('DONE! Post Published 🎉');
  setTimeout(()=>location.href='index.html',2000);
} catch(err) {
  toast('ERROR: '+err.message);
  btn.disabled=false; btn.innerText='Publish Post';
}
}

async function uploadFile(url,file){
return new Promise((resolve,reject)=>{
const xhr=new XMLHttpRequest();
xhr.upload.onprogress=e=>{if(e.lengthComputable) document.getElementById('progress').style.width=(e.loaded/e.total*100)+'%'}
xhr.onload=()=>{toast('B2 Upload HTTP: '+xhr.status); xhr.status>=200 && xhr.status<300? resolve() : reject(new Error('B2 Upload failed '+xhr.status))};
xhr.onerror=()=>{toast('B2 Network Error') ;reject(new Error('Network error'))};
xhr.open('PUT',url);
xhr.send(file);
});
}
</script>
</body>
</html>
