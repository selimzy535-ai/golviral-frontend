<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GolViral Admin</title>
  <meta name="theme-color" content="#FF0050">
  <style>
    :root { --accent: #FF0050; --bg: #0A0A0A; --card: #111; --gray: #222; --text: #FFF; --muted: #888; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
    h2 { margin-bottom: 15px; }
   .tabs { display: flex; border-bottom: 1px solid var(--gray); margin-bottom: 15px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
   .tab { flex: 1; padding: 12px; text-align: center; background: none; border: none; color: var(--muted); font-weight: bold; cursor: pointer; }
   .tab.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
   .pane { display: none; }
   .pane.active { display: block; }
   .card { background: var(--card); border: 1px solid var(--gray); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    video { width: 100%; border-radius: 6px; background: #000; max-height: 70vh; }
   .btn { background: var(--accent); color: #fff; border: none; padding: 12px 16px; border-radius: 4px; margin-right: 8px; cursor: pointer; font-weight: bold; flex: 1; }
   .btn.reject { background: var(--gray); }
   .btn.warn { background: #FFA500; color: #000; }
   .row { display: flex; gap: 8px; margin-top: 10px; }
    h3 { margin: 0 0 5px 0; font-size: 16px; }
    p { margin: 4px 0; color: var(--muted); font-size: 13px; }
   .badge { background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; display: inline-block; }
   .stat { display: flex; justify-content: space-between; margin: 6px 0; font-size: 14px; }
   .stat b { color: var(--text); }
   .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
   .logout { position: fixed; bottom: 15px; left: 15px; right: 15px; }
   .loading { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <h2>GolViral Admin Panel <span class="badge">v4.5</span></h2>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('posts', event)">Post Queue</button>
    <button class="tab" onclick="switchTab('payouts', event)">Payouts</button>
  </div>

  <div id="pane-posts" class="pane active">
    <div id="list-posts">Loading posts...</div>
  </div>

  <div id="pane-payouts" class="pane">
    <div id="list-payouts">Loading payouts...</div>
  </div>

  <button class="btn logout" onclick="logout()">Logout</button>

  <script>
    const API = 'https://golviral-api.onrender.com';
    const token = localStorage.getItem('token');
    if(!token) location.href = './index.html#/auth';

    function switchTab(tab, e) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('pane-' + tab).classList.add('active');
      if(tab === 'posts') loadPosts();
      if(tab === 'payouts') loadPayouts();
    }

    async function api(path, method='GET', body=null) {
      const opts = {method, headers:{Authorization:`Bearer ${token}`}};
      if(body) { opts.headers['Content-Type']='application/json'; opts.body=body; }
      const r = await fetch(`${API}${path}`, opts);
      if(r.status === 403) { alert('Admin access only'); logout(); }
      if(r.status === 401) { alert('Session expired'); logout(); }
      return r.json();
    }

    async function signUrl(key, shard) {
      try {
        const r = await api(`/api/media/sign?key=${encodeURIComponent(key)}&shard=${shard}`);
        return r.url || '';
      } catch {
        return '';
      }
    }

    // ===== POSTS QUEUE =====
    async function loadPosts() {
      const el = document.getElementById('list-posts');
      el.innerHTML = 'Loading...';
      const posts = await api('/api/admin/posts/pending');
      if(!posts.length) return el.innerHTML = '<div class="empty">No pending posts 🎉</div>';

      el.innerHTML = '<div class="loading">Signing video links, please wait...</div>';

      const cards = await Promise.all(posts.map(async p => {
        let mediaHtml = '';
        if(p.type==='reel' && p.mediaUrl) {
          const url = await signUrl(p.mediaUrl, p.b2Shard);
          mediaHtml = url? `<video src="${url}" controls preload="metadata"></video>`
                          : `<p style="color:red">Video URL failed. Check B2 keys.</p>`;
        } else {
          mediaHtml = `<h3>${p.title || 'Untitled'}</h3><p>${(p.content||'').slice(0,300)}${p.content?.length>300?'...':''}</p>`;
        }

        return `
        <div class="card" id="post-${p.id}">
          <h3>@${p.user?.username || p.userId} <span class="badge">${p.type}</span></h3>
          <div class="stat"><span>Cost</span><b>${p.type==='reel'?25:10} pts</b></div>
          <div class="stat"><span>Shard</span><b>DB${p.b2Shard+1}</b></div>
          ${mediaHtml}
          <div class="row">
            <button class="btn" onclick="postAction('${p.id}','approve')">Approve</button>
            <button class="btn reject" onclick="postAction('${p.id}','reject')">Reject + Refund</button>
          </div>
        </div>`;
      }));

      el.innerHTML = cards.join('');
    }

    async function postAction(id, action) {
      if(action==='reject' &&!confirm('Reject and refund 25pts?')) return;
      await api(`/api/admin/posts/${id}/${action}`, 'POST');
      document.getElementById('post-'+id).remove();
    }

    // ===== PAYOUTS QUEUE =====
    async function loadPayouts() {
      const el = document.getElementById('list-payouts');
      el.innerHTML = 'Loading...';
      const payouts = await api('/api/admin/payouts');
      if(!payouts.length) return el.innerHTML = '<div class="empty">No pending payouts 💰</div>';

      el.innerHTML = payouts.map(p => `
        <div class="card" id="payout-${p.id}">
          <h3>Payout Request <span class="badge">₦${(p.amountPoints * 0.1).toFixed(2)}</span></h3>
          <div class="stat"><span>User ID</span><b>${p.userId}</b></div>
          <div class="stat"><span>Points</span><b>${p.amountPoints}</b></div>
          <div class="stat"><span>To</span><b>${p.routingTarget}</b></div>
          <div class="stat"><span>Details</span><b>${p.targetDetails}</b></div>
          <div class="row">
            <button class="btn" onclick="payoutAction('${p.id}','${p.userId}','approve')">Approve</button>
            <button class="btn reject" onclick="payoutAction('${p.id}','${p.userId}','reject')">Reject</button>
          </div>
        </div>
      `).join('');
    }

    async function payoutAction(id, userId, action) {
      if(action==='reject') {
        const reason = prompt('Rejection reason for user:');
        if(!reason) return;
        await api(`/api/admin/payouts/reject`, 'POST', JSON.stringify({payoutId:id, userId, reason}));
      } else {
        await api(`/api/admin/payouts/approve`, 'POST', JSON.stringify({payoutId:id, userId}));
      }
      document.getElementById('payout-'+id).remove();
    }

    function logout() {
      localStorage.removeItem('token');
      location.href = './index.html#/auth';
    }

    // init
    loadPosts();
  </script>
</body>
</html>
