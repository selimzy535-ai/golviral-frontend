<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GolViral - Reels</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* Fullscreen Snap Container */
        .reels-container {
            width: 100vw;
            height: calc(100vh - 60px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }
        /* Individual Reel Slide */
        .reel-slide {
            width: 100vw;
            height: calc(100vh - 60px);
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* UI Overlays */
        .video-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 200, 83, 0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            z-index: 10;
        }
        .reel-meta {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 80px;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .author-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .caption {
            font-size: 14px;
            color: #E0E0E0;
        }
        /* Right Side Actions */
        .action-bar {
            position: absolute;
            right: 15px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            backdrop-filter: blur(5px);
        }
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 60px;
            background: #0A0A0A;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-item.active {
            color: #FFF;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>Feed</span></a>
        <a href="explore.html" class="nav-item"><span>🔍</span><span>Explore</span></a>
        <a href="post.html" class="nav-item"><span>➕</span><span>Post</span></a>
        <a href="reels.html" class="nav-item active"><span>🎬</span><span>Reels</span></a>
        <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
    </nav>

    <script>
        const API_BASE = "https://api.golviral.com";
        const token = localStorage.getItem("token") || "";
        const container = document.getElementById("reelsContainer");
        
        let viewedPosts = new Set();
        let activeTimers = {};

        // Fetch Reels via API
        async function fetchReels() {
            try {
                const res = await fetch(`${API_BASE}/posts?type=reel`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Failed to fetch reels");
                const posts = await res.json();
                renderReels(posts);
            } catch (err) {
                console.error(err);
                // Fallback / Placeholder if API is offline during initial frontend testing
            }
        }

        function renderReels(posts) {
            posts.forEach(post => {
                const slide = document.createElement("div");
                slide.className = "reel-slide";
                slide.dataset.id = post.id;

                // Check cache status directly using local storage keys populated by sw.js or via runtime verification
                slide.innerHTML = `
                    <div class="video-badge" id="badge-${post.id}">Video Cached</div>
                    <video src="${post.mediaUrl}" loop muted playsinline webkit-playsinline></video>
                    <div class="reel-meta">
                        <div class="author-name">@${post.username || 'creator'}</div>
                        <div class="caption">${post.caption || ''}</div>
                    </div>
                    <div class="action-bar">
                        <button class="action-btn" onclick="likePost('${post.id}')">❤️</button>
                        <button class="action-btn" onclick="sharePost('${post.id}')">🔗</button>
                    </div>
                `;
                container.appendChild(slide);
                checkCacheStatus(post.mediaUrl, post.id);
            });
            initializeObserver();
        }

        // Query Cache API to dynamic view "Video cached" badge
        async function checkCacheStatus(url, id) {
            if ('caches' in window) {
                const cache = await caches.open('v4.4-media-cache');
                const matched = await cache.match(url);
                if (matched) {
                    document.getElementById(`badge-${id}`).style.display = 'block';
                }
            }
        }

        // View Tracking via Intersection Observer
        function initializeObserver() {
            const observerOptions = {
                root: container,
                target: null,
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector("video");
                    const postId = entry.target.dataset.id;

                    if (entry.isIntersecting) {
                        if (video) video.play().catch(()=>{});
                        
                        // Start 3-second view metric trigger tracking
                        if (!viewedPosts.has(postId)) {
                            activeTimers[postId] = setTimeout(() => {
                                triggerViewMetric(postId);
                            }, 3000);
                        }
                    } else {
                        if (video) video.pause();
                        // Clear timer if user swipes away before 3 seconds
                        if (activeTimers[postId]) {
                            clearTimeout(activeTimers[postId]);
                            delete activeTimers[postId];
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll(".reel-slide").forEach(slide => observer.observe(slide));
        }

        // Send Async metric update execution to API 
        async function triggerViewMetric(postId) {
            viewedPosts.add(postId);
            delete activeTimers[postId];
            try {
                await fetch(`${API_BASE}/view`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ postId })
                });
            } catch (err) {
                console.error("Metric registration failed", err);
            }
        }

        // Interactive Hooks
        function likePost(postId) {
            fetch(`${API_BASE}/like`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ postId })
            });
        }

        // Volume auto toggle listener on click for UX standard conversion
        window.addEventListener("click", () => {
            document.querySelectorAll("video").forEach(v => v.muted = false);
        }, { once: true });

        // Init implementation sequence
        fetchReels();
    </script>
</body>
</html>
